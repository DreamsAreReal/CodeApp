<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>async/await в C# — Урок · C#</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;600;700;800&family=Onest:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    /* ---- fixed "mid" design tokens (no hardcoded colors outside these) ---- */
    --bg:#F6F1E9; --surface:#FFFFFF; --ink:#23201B; --muted:#8A8377; --line:#E7DFD2;
    --coral:#F0533A; --coral-l:#FF6A4E; --coral-d:#C43D28; --coral-tint:#FBE7E1; --coral-wash:#FFF8F5;
    --sage:#7C8B6F; --sage-tint:#EAEEE4; --amber:#E8A13A; --amber-tint:#F7E9CF;
    --page-0:#F1E9DB; --page-1:#E9DFCD; --page-2:#E3D8C3;
    --locked-bg:#FCFAF6; --muted-tile:#F1ECE2;
    --shadow-1:0 2px 8px rgba(35,32,27,.06), 0 8px 22px -10px rgba(35,32,27,.10);
    --shadow-2:0 3px 12px rgba(35,32,27,.08), 0 18px 40px -16px rgba(35,32,27,.14);
    --r-s:14px; --r-m:18px; --r-l:22px;
    --display:"Rubik",system-ui,sans-serif;
    --body:"Onest",system-ui,sans-serif;
    --mono:"JetBrains Mono",ui-monospace,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{ -webkit-text-size-adjust:100%; }
  body{
    font-family:var(--body); color:var(--ink);
    background:radial-gradient(120% 80% at 50% -10%, var(--page-0) 0%, var(--page-1) 60%, var(--page-2) 100%);
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:34px 0 40px; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }

  /* ============ MOBILE APP FRAME ~390px ============ */
  .frame{
    width:390px; max-width:100vw; background:var(--bg);
    border-radius:40px; overflow:hidden; position:relative; display:flex; flex-direction:column;
    box-shadow:0 40px 90px -34px rgba(35,32,27,.42), 0 0 0 1px rgba(35,32,27,.04);
  }

  /* ============ LESSON TOP BAR ============ */
  .lbar{ display:flex; align-items:center; gap:12px; padding:16px 16px 10px; }
  .close{
    flex:none; width:32px; height:32px; border-radius:11px; border:1px solid var(--line);
    background:var(--surface); color:var(--muted); cursor:pointer; box-shadow:var(--shadow-1);
    display:flex; align-items:center; justify-content:center; transition:transform .08s ease;
  }
  .close:active{ transform:scale(.94); }
  .close svg{ width:16px; height:16px; }
  .lprog{ flex:1; height:6px; border-radius:5px; background:var(--line); overflow:hidden; }
  .lprog > i{ display:block; height:100%; width:8%; border-radius:5px;
    background:linear-gradient(90deg,var(--coral-l),var(--coral));
    transition:width .5s cubic-bezier(.2,.7,.2,1); }
  .xp{
    flex:none; display:inline-flex; align-items:center; gap:5px; padding:6px 9px;
    background:var(--surface); border:1px solid var(--line); border-radius:11px;
    box-shadow:var(--shadow-1); line-height:1;
  }
  .xp svg{ width:15px; height:15px; color:var(--amber); }
  .xp b{ font-family:var(--mono); font-weight:700; font-size:12.5px; color:var(--ink); }
  .xp .u{ font-size:10.5px; font-weight:500; color:var(--muted); }
  .xp.bump{ animation:xpBump .5s ease; }
  @keyframes xpBump{ 0%{transform:scale(1)} 40%{transform:scale(1.14)} 100%{transform:scale(1)} }

  /* ============ SCROLL BODY ============ */
  .body{ padding:4px 16px 18px; display:flex; flex-direction:column; gap:16px; }

  .sec-label{
    display:flex; align-items:center; gap:10px; padding:6px 2px 0;
    font-size:11px; font-weight:600; letter-spacing:.10em; text-transform:uppercase; color:var(--muted);
  }
  .sec-label .num{
    font-family:var(--mono); font-weight:700; color:var(--coral);
    background:var(--coral-tint); border-radius:6px; padding:2px 6px; font-size:10.5px; letter-spacing:.04em;
  }
  .sec-label::after{ content:""; flex:1; height:1px; background:var(--line); }

  .card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--r-l);
    padding:18px; box-shadow:var(--shadow-1);
  }
  code, .mono{ font-family:var(--mono); }
  code{ font-size:.92em; background:var(--muted-tile); border-radius:6px; padding:1px 5px; color:var(--ink); }

  /* ---- Section 1 · hook / refutation ---- */
  .hook{ position:relative; overflow:hidden; }
  .hook::before{
    content:""; position:absolute; right:-46px; top:-46px; width:140px; height:140px; border-radius:50%;
    background:radial-gradient(circle, rgba(240,83,58,.12), rgba(240,83,58,0) 70%); pointer-events:none;
  }
  .tag-mis{
    display:inline-flex; align-items:center; gap:6px;
    font-size:10.5px; font-weight:700; letter-spacing:.10em; text-transform:uppercase;
    color:var(--coral); background:var(--coral-tint); padding:4px 9px; border-radius:8px;
  }
  .tag-mis svg{ width:13px; height:13px; }
  .hook-txt{ margin-top:12px; font-size:15px; line-height:1.5; color:var(--ink); font-weight:400; }
  .hook-txt b{ font-weight:700; }
  .hook-txt .wrong{ color:var(--coral-d); font-weight:700; }
  .hook-txt code{ font-size:.9em; }

  /* ---- Section 2 · living diagram ---- */
  .viz-card{ padding:16px 14px 14px; }
  .code-panel{
    font-family:var(--mono); font-size:12px; line-height:1; color:var(--ink);
    background:#FBF7F0; border:1px solid var(--line); border-radius:var(--r-m);
    padding:8px; overflow:hidden;
  }
  .cl-line{
    display:flex; align-items:center; gap:9px; padding:6px 8px; border-radius:9px;
    border-left:3px solid transparent; transition:background .25s ease, border-color .25s ease;
    white-space:pre; letter-spacing:-.01em;
  }
  .cl-line .ln{ color:var(--muted); font-size:11px; width:12px; text-align:right; opacity:.7; }
  .cl-line.cur{ background:var(--coral-wash); border-left-color:var(--coral); }
  .cl-line.cur .ln{ color:var(--coral); opacity:1; }
  .tok-ty{ color:var(--sage); font-weight:600; }
  .tok-kw{ color:var(--coral-d); font-weight:700; }
  .tok-num{ color:var(--coral-d); font-weight:600; }
  .tok-cls{ color:var(--ink); font-weight:600; }
  .tok-pun{ color:var(--muted); }

  .stage{ margin-top:12px; width:100%; display:block; }
  .stage svg{ width:100%; height:auto; display:block; }

  /* diagram chrome — timeline tracks + axis */
  .vz-track{ fill:#FCFAF6; stroke:var(--line); stroke-width:1.2; }
  .vz-track.sm{ fill:var(--sage-tint); }
  .vz-track.io{ fill:var(--coral-wash); }
  .vz-tlabel{ font-family:var(--display); font-size:9.5px; font-weight:700; letter-spacing:.10em; fill:var(--muted); }
  .vz-tlabel.sm{ fill:var(--sage); }
  .vz-tlabel.io{ fill:var(--coral-d); }
  .vz-tsub{ font-family:var(--mono); font-size:8px; font-weight:600; letter-spacing:.02em; fill:var(--muted); }
  .vz-tsub.hl{ fill:var(--coral-d); }
  .vz-axis{ stroke:var(--line); stroke-width:1.4; }
  #vz-arrow path, #vz-arrow2 path{ fill:var(--coral); }

  /* data-join nodes */
  .vz-layer text{ pointer-events:none; }
  .edge{ stroke:var(--coral); stroke-width:2; fill:none; }
  .edge.accent{ stroke:var(--coral-d); stroke-width:2.4; }
  .node{ transition:opacity .3s ease; }
  .node.ghost{ opacity:0; }

  .vz-playhead{ stroke:var(--coral); stroke-width:1.4; stroke-dasharray:3 3; opacity:.65; }
  .vz-playdot{ fill:var(--coral); }

  .vz-state{ fill:#fff; stroke:var(--line); stroke-width:1.5; }
  .node.accent .vz-state{ stroke:var(--coral); stroke-width:2; }
  .vz-sval{ font-family:var(--mono); font-size:13px; font-weight:800; fill:var(--coral-d); }
  .vz-ssub{ font-family:var(--mono); font-size:8.5px; font-weight:600; fill:var(--muted); }

  .vz-token{ fill:var(--coral); stroke:var(--coral-d); stroke-width:1; }
  .vz-token.free{ fill:var(--sage); stroke:#5f6e54; }
  .vz-ttext{ font-family:var(--mono); font-size:10px; font-weight:700; fill:#fff; }

  .vz-pill{ fill:#fff; stroke:var(--line); stroke-width:1.4; }
  .vz-pill.coral{ fill:var(--coral-wash); stroke:var(--coral); }
  .vz-pill.sage{ fill:var(--sage-tint); stroke:var(--sage); }
  .vz-pill.amber{ fill:var(--amber-tint); stroke:var(--amber); }
  .node.accent .vz-pill{ stroke-width:2; }
  .vz-ptext{ font-family:var(--mono); font-size:10px; font-weight:700; fill:var(--ink); }

  .vz-mk{ fill:var(--coral); stroke:#fff; stroke-width:1.5; }
  .node.accent .vz-mk{ fill:var(--coral-d); }
  .vz-mklbl{ font-family:var(--mono); font-size:8.5px; font-weight:700; fill:var(--muted); }
  .node.accent .vz-mklbl{ fill:var(--coral-d); }

  /* console (Task lifecycle readout) */
  .vz-console{
    margin-top:11px; display:flex; align-items:center; gap:8px;
    font-family:var(--mono); font-size:13px; color:var(--ink);
    background:#FBF7F0; border:1px solid var(--line); border-radius:12px; padding:9px 12px; min-height:38px;
  }
  .vz-cprompt{ color:var(--sage); font-weight:700; }
  .vz-clbl{ color:var(--muted); font-size:11px; }
  .vz-cout{ font-weight:700; color:var(--coral-d); font-size:14px; opacity:0; transition:opacity .3s ease; }
  .vz-cout.show{ opacity:1; }
  .vz-cout.done{ color:var(--sage); }
  .vz-caret{ width:7px; height:15px; background:var(--muted); opacity:.35; border-radius:1px;
    animation:blink 1.1s step-end infinite; }
  @keyframes blink{ 50%{opacity:0} }

  /* controls */
  .vz-ctrls{ margin-top:12px; display:flex; align-items:center; gap:9px; }
  .vz-nav, .vz-play{
    flex:none; border:1px solid var(--line); background:var(--surface); cursor:pointer;
    display:flex; align-items:center; justify-content:center; color:var(--ink);
    box-shadow:var(--shadow-1); transition:transform .08s ease;
  }
  .vz-nav{ width:38px; height:38px; border-radius:12px; }
  .vz-nav:active{ transform:scale(.93); }
  .vz-nav:disabled{ opacity:.4; cursor:not-allowed; }
  .vz-nav svg{ width:16px; height:16px; }
  .vz-play{
    width:44px; height:44px; border-radius:14px; border:none; color:#fff;
    background:linear-gradient(180deg,var(--coral-l),var(--coral));
    box-shadow:0 4px 0 var(--coral-d), 0 12px 20px -8px rgba(196,61,40,.5);
  }
  .vz-play:active{ transform:translateY(3px); box-shadow:0 1px 0 var(--coral-d); }
  .vz-play svg{ width:19px; height:19px; }
  .vz-steplabel{ margin-left:2px; font-family:var(--mono); font-size:12px; font-weight:600; color:var(--muted); white-space:nowrap; }
  .vz-scrub{ margin-left:auto; display:flex; gap:5px; }
  .vz-seg{ width:22px; height:8px; border-radius:5px; border:none; background:var(--line); cursor:pointer; padding:0; transition:background .2s ease, transform .08s ease; }
  .vz-seg:active{ transform:scaleY(1.3); }
  .vz-seg.done{ background:var(--coral-tint); }
  .vz-seg.cur{ background:var(--coral); }

  /* caption (temporal contiguity) */
  .vz-caption{
    margin-top:13px; font-family:var(--mono); font-size:12px; line-height:1.6; color:var(--muted);
    background:var(--sage-tint); border-radius:12px; padding:11px 13px; min-height:44px;
    transition:opacity .25s ease;
  }
  .vz-caption b{ color:var(--ink); font-weight:700; }
  .vz-caption .hl{ color:var(--coral-d); font-weight:700; }
  .vz-caption .q{ font-style:italic; color:var(--sage); }
  .vz-caption code{ font-size:.92em; }

  /* autoplay hint */
  .vz-autohint{
    margin-top:9px; display:flex; align-items:center; gap:7px;
    font-family:var(--mono); font-size:10px; font-weight:600; color:var(--muted);
  }
  .vz-autohint svg{ width:12px; height:12px; color:var(--coral); }
  .vz-autohint[hidden]{ display:none; }

  /* predict gate */
  .vz-predict{
    margin-top:12px; border:1.5px dashed var(--coral); background:var(--coral-wash);
    border-radius:var(--r-m); padding:14px; text-align:center;
  }
  .vz-predict[hidden]{ display:none; }
  .vz-ptitle{ font-size:10.5px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--coral); }
  .vz-pq{ margin-top:7px; font-size:14.5px; font-weight:500; color:var(--ink); }
  .vz-pq code{ font-size:.9em; }
  .vz-pshow{
    margin-top:12px; border:none; cursor:pointer; font-family:var(--display); font-weight:700; font-size:14px;
    color:#fff; background:linear-gradient(180deg,var(--coral-l),var(--coral)); border-radius:13px; padding:11px 20px;
    display:inline-flex; align-items:center; gap:7px;
    box-shadow:0 4px 0 var(--coral-d), 0 12px 20px -8px rgba(196,61,40,.5); transition:transform .08s ease, box-shadow .08s ease;
  }
  .vz-pshow:active{ transform:translateY(3px); box-shadow:0 1px 0 var(--coral-d); }
  .vz-pshow svg{ width:15px; height:15px; }

  /* ---- Section 3 · predict MCQ ---- */
  .q-title{ font-family:var(--display); font-weight:700; font-size:16px; color:var(--ink); }
  .q-title code{ font-size:.86em; }
  .opts{ margin-top:13px; display:grid; grid-template-columns:1fr; gap:9px; }
  .opt{
    border:1.5px solid var(--line); background:var(--surface); border-radius:13px; padding:12px 12px; cursor:pointer;
    display:flex; align-items:center; gap:9px; text-align:left; transition:border-color .15s ease, background .15s ease, transform .08s ease;
  }
  .opt:active{ transform:scale(.98); }
  .opt .mk{
    flex:none; width:20px; height:20px; border-radius:7px; border:1.5px solid var(--line);
    display:flex; align-items:center; justify-content:center; color:transparent;
  }
  .opt .mk svg{ width:12px; height:12px; }
  .opt .ot{ font-family:var(--mono); font-weight:600; font-size:13px; color:var(--ink); }
  .opt.sel{ border-color:var(--coral); background:var(--coral-wash); }
  .opt.sel .mk{ border-color:var(--coral); background:var(--coral); color:#fff; }
  .opt.correct{ border-color:var(--sage); background:var(--sage-tint); }
  .opt.correct .mk{ border-color:var(--sage); background:var(--sage); color:#fff; }
  .opt.wrong{ border-color:var(--coral-d); background:var(--coral-tint); }
  .opt.wrong .mk{ border-color:var(--coral-d); background:var(--coral-d); color:#fff; }
  .opt.locked{ pointer-events:none; }
  .q-check{
    margin-top:13px; width:100%; border:none; cursor:pointer;
    font-family:var(--display); font-weight:700; font-size:15.5px; color:#fff;
    background:linear-gradient(180deg,var(--coral-l),var(--coral)); border-radius:14px; padding:13px;
    box-shadow:0 5px 0 var(--coral-d), 0 14px 24px -8px rgba(196,61,40,.5);
    transition:transform .08s ease, box-shadow .08s ease;
  }
  .q-check:active{ transform:translateY(4px); box-shadow:0 1px 0 var(--coral-d); }
  .q-check:disabled{ opacity:.5; cursor:not-allowed; box-shadow:0 5px 0 var(--coral-d); }
  .q-banner{ margin-top:13px; border-radius:13px; padding:13px 14px; display:none; }
  .q-banner.show{ display:block; animation:bannerIn .3s ease; }
  @keyframes bannerIn{ from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none} }
  .q-banner.ok{ background:var(--sage-tint); border:1px solid rgba(124,139,111,.5); }
  .q-banner.no{ background:var(--coral-tint); border:1px solid rgba(196,61,40,.4); }
  .q-bhead{ font-family:var(--display); font-weight:800; font-size:14.5px; display:flex; align-items:center; gap:8px; }
  .q-banner.ok .q-bhead{ color:var(--sage); }
  .q-banner.no .q-bhead{ color:var(--coral-d); }
  .q-bhead .xpp{ margin-left:auto; font-family:var(--mono); font-size:12px; font-weight:700; color:var(--amber);
    background:var(--amber-tint); border-radius:7px; padding:2px 7px; }
  .q-btext{ margin-top:7px; font-size:13px; line-height:1.5; color:var(--ink); }
  .q-btext b{ font-weight:700; } .q-btext .hl{ color:var(--coral-d); font-weight:700; }
  .q-btext code{ font-size:.9em; } .q-btext .q{ color:var(--muted); font-style:italic; }

  /* ---- Section 4/5 · edge case ---- */
  .edge-card{ border-left:3px solid var(--amber); }
  .edge-head{ display:flex; align-items:center; gap:9px; font-family:var(--display); font-weight:700; font-size:15px; color:var(--ink); }
  .edge-head .warn{ flex:none; width:24px; height:24px; border-radius:8px; background:var(--amber-tint); color:var(--amber);
    display:flex; align-items:center; justify-content:center; }
  .edge-head .warn svg{ width:15px; height:15px; }
  .edge-body{ margin-top:11px; font-size:13.5px; line-height:1.55; color:var(--ink); font-weight:400; }
  .edge-body b{ font-weight:700; } .edge-body .hl{ color:var(--coral-d); font-weight:700; }
  .edge-body code{ font-size:.86em; } .edge-body .q{ color:var(--muted); font-style:italic; }
  .cmp{ margin-top:12px; display:grid; grid-template-columns:1fr 1fr; gap:9px; }
  .cmp .box{ border:1px solid var(--line); border-radius:12px; padding:10px 11px; }
  .cmp .box.bad{ background:var(--coral-wash); border-color:rgba(196,61,40,.3); }
  .cmp .box.good{ background:var(--sage-tint); border-color:rgba(124,139,111,.4); }
  .cmp .lbl{ font-family:var(--mono); font-size:12px; font-weight:700; }
  .cmp .box.bad .lbl{ color:var(--coral-d); } .cmp .box.good .lbl{ color:var(--sage); }
  .cmp .desc{ margin-top:5px; font-size:11.5px; line-height:1.4; color:var(--muted); }

  /* ---- Inline depth claims — woven into the flow (verbatim MS Learn) ---- */
  .claim-list{ display:flex; flex-direction:column; }
  .dd-claim{ border-left:3px solid var(--coral); background:var(--coral-wash);
    border-radius:0 12px 12px 0; padding:11px 13px; margin-top:11px; }
  .dd-claim:first-child{ margin-top:0; }
  .dd-claim.sage{ border-left-color:var(--sage); background:var(--sage-tint); }
  .dd-claim.amber{ border-left-color:var(--amber); background:var(--amber-tint); }
  .dd-ctitle{ font-family:var(--display); font-weight:700; font-size:13px; color:var(--ink); display:flex; gap:7px; align-items:center; }
  .dd-ctitle .n{ font-family:var(--mono); font-size:10.5px; font-weight:700; color:var(--coral);
    background:#fff; border:1px solid var(--line); border-radius:6px; padding:1px 6px; letter-spacing:.02em; }
  .dd-claim.sage .dd-ctitle .n{ color:var(--sage); }
  .dd-claim.amber .dd-ctitle .n{ color:var(--amber); }
  .dd-ctext{ margin-top:6px; font-size:12.5px; line-height:1.55; color:var(--ink); }
  .dd-ctext b{ font-weight:700; } .dd-ctext .hl{ color:var(--coral-d); font-weight:700; }
  .dd-ctext code{ font-size:.88em; }
  .dd-ctext .q{ color:var(--muted); font-style:italic; }
  .dd-src{ margin-top:9px; display:flex; flex-wrap:wrap; gap:6px; }
  .dd-src a{ display:inline-flex; align-items:center; gap:5px; text-decoration:none;
    font-family:var(--mono); font-size:9.5px; font-weight:600; color:var(--sage);
    background:#fff; border:1px solid var(--line); border-radius:8px; padding:4px 8px;
    transition:transform .08s ease, border-color .15s ease; }
  .dd-src a:active{ transform:scale(.97); }
  .dd-src a:hover{ border-color:var(--sage); }
  .dd-src svg{ width:11px; height:11px; flex:none; }

  /* track footnotes under the living diagram (sourced) */
  .vz-notes{ margin-top:11px; display:flex; flex-direction:column; gap:8px; }
  .vz-note{ display:flex; gap:9px; align-items:flex-start;
    font-size:11.5px; line-height:1.5; color:var(--muted);
    background:#FBF7F0; border:1px solid var(--line); border-radius:11px; padding:9px 11px; }
  .vz-note b{ color:var(--ink); font-weight:700; }
  .vz-note .hl{ color:var(--coral-d); font-weight:700; }
  .vz-note .q{ font-style:italic; }
  .vz-note code{ font-size:.9em; }
  .vz-nk{ flex:none; font-family:var(--mono); font-size:9px; font-weight:700; letter-spacing:.04em;
    text-transform:uppercase; color:var(--sage); background:var(--sage-tint);

/* C#-ish tokenizer for the code panel (data-driven from lesson.viz.code). */
function hlCode(line){
  var kws = {"async":1,"await":1,"return":1,"var":1,"using":1,"new":1};
  var types = {"int":1,"object":1,"string":1,"bool":1,"double":1,"void":1,"long":1,"short":1,"byte":1,"char":1,"float":1,"decimal":1,"Task":1};
  var classes = {"Console":1,"Thread":1,"List":1,"HttpClient":1};
  var re = /([A-Za-z_][A-Za-z0-9_]*)|(\d+)|(\s+)|([^\sA-Za-z0-9_])/g, out="", m;
  while((m = re.exec(line))){
    if(m[1]){ var w=m[1];
      if(kws[w]) out += '<span class="tok-kw">'+w+'</span>';
      else if(types[w]) out += '<span class="tok-ty">'+w+'</span>';
      else if(classes[w]) out += '<span class="tok-cls">'+w+'</span>';
      else out += esc(w);
    } else if(m[2]){ out += '<span class="tok-num">'+m[2]+'</span>'; }
    else if(m[3]){ out += m[3]; }
    else { out += '<span class="tok-pun">'+esc(m[4])+'</span>'; }
  }
  return out;
}

/* ==========================================================================
   ENGINE — faithful port of the RS-08 living-diagram architecture (SAME as the
   boxing lesson): declarative Scene -> pure render(Scene)->VNode -> keyed
   data-join diff (enter/update/exit) -> planFlip (transform-only invert) ->
   deterministic StepPlayer (index = single source of truth). Zero dependencies.
   Extended with TIMELINE primitives (track / state / token / pill / marker /
   playhead) and generic edge geometry (auto horizontal|vertical handoffs).
   The SAME engine drives BOTH scenes (async-timeline and context-contrast).
   ========================================================================== */
function render(scene){
  var kids = [], i;
  for (i=0;i<scene.edges.length;i++){
    var e = scene.edges[i];
    var a = findNode(scene.nodes, e.from), b = findNode(scene.nodes, e.to);
    if(!a || !b) continue;
    var g = edgeGeom(a, b);
    kids.push({tag:"line", key:"e:"+e.id, attrs:{
      x1:g.x1, y1:g.y1, x2:g.x2, y2:g.y2, "marker-end":scene._marker||"url(#vz-arrow)",
      "class": e.accent ? "edge accent" : "edge"
    }});
  }
  for (var j=0;j<scene.nodes.length;j++) kids.push(renderNode(scene.nodes[j]));
  return {tag:"g", key:"root", attrs:{}, children:kids};
}
function findNode(nodes, id){ for(var i=0;i<nodes.length;i++) if(nodes[i].id===id) return nodes[i]; return null; }

/* Generic edge geometry: picks horizontal or vertical anchoring by dominant axis,
   so the SAME edge model serves both left->right memory arrows and cross-lane
   timeline handoffs (state machine -> I/O, I/O -> continuation, etc.). */
function edgeGeom(a, b){
  var ax=a.x, ay=a.y, bx=b.x, by=b.y;
  var aw=(a.w||12), ah=(a.h||12), bw=(b.w||12), bh=(b.h||12);
  var dx=bx-ax, dy=by-ay;
  if (Math.abs(dx) >= Math.abs(dy)){
    var s = dx>=0?1:-1;
    return { x1: ax + s*(aw/2+2), y1: ay, x2: bx - s*(bw/2+6), y2: by };
  }
  var s2 = dy>=0?1:-1;
  return { x1: ax, y1: ay + s2*(ah/2+2), x2: bx, y2: by - s2*(bh/2+6) };
}

function renderNode(n){
  var cls = ["node", n.kind, n.accent?"accent":"", n.ghost?"ghost":""].filter(Boolean).join(" ");
  var children = [], hw = n.w/2, hh = n.h/2;
  if (n.kind === "now"){
    var half = (n.h||170)/2;
    children.push({tag:"line", key:"ph", attrs:{x1:0, y1:-half, x2:0, y2:half, "class":"vz-playhead"}});
    children.push({tag:"circle", key:"pd", attrs:{cx:0, cy:-half, r:4, "class":"vz-playdot"}});
  } else if (n.kind === "state"){
    children.push({tag:"rect", key:"bx", attrs:{x:-hw, y:-hh, width:n.w, height:n.h, rx:10, "class":"vz-state"}});
    children.push({tag:"text", key:"vl", attrs:{x:0, y:-2, "text-anchor":"middle", "class":"vz-sval"}, text:n.value});
    if (n.sub) children.push({tag:"text", key:"sb", attrs:{x:0, y:13, "text-anchor":"middle", "class":"vz-ssub"}, text:n.sub});
  } else if (n.kind === "token"){
    children.push({tag:"rect", key:"bx", attrs:{x:-hw, y:-hh, width:n.w, height:n.h, rx:13, "class":"vz-token"+(n.tone==="free"?" free":"")}});
    children.push({tag:"text", key:"tx", attrs:{x:0, y:4, "text-anchor":"middle", "class":"vz-ttext"}, text:n.label});
  } else if (n.kind === "pill"){
    children.push({tag:"rect", key:"bx", attrs:{x:-hw, y:-hh, width:n.w, height:n.h, rx:11, "class":"vz-pill"+(n.tone?" "+n.tone:"")}});
    children.push({tag:"text", key:"tx", attrs:{x:0, y:4, "text-anchor":"middle", "class":"vz-ptext"}, text:n.label});
  } else if (n.kind === "marker"){
    children.push({tag:"circle", key:"dot", attrs:{cx:0, cy:0, r:5, "class":"vz-mk"}});
    children.push({tag:"text", key:"lb", attrs:{x:0, y:16, "text-anchor":"middle", "class":"vz-mklbl"}, text:n.label});
  }
  return {tag:"g", key:"n:"+n.id, attrs:{transform:"translate("+n.x+","+n.y+")", "class":cls}, children:children};
}

function serialize(v){
  var keys = Object.keys(v.attrs).sort();
  var a = keys.map(function(k){ return k+'="'+v.attrs[k]+'"'; }).join(" ");
  var open = a ? "<"+v.tag+" "+a+">" : "<"+v.tag+">";
  var inner = (v.text!=null) ? v.text : (v.children||[]).map(serialize).join("");
  return open + inner + "</"+v.tag+">";
}

function diff(prev, next){
  var pk = childKeys(prev), nk = childKeys(next), pset={}, nset={}, i;
  for (i=0;i<pk.length;i++) pset[pk[i]] = 1;
  for (i=0;i<nk.length;i++) nset[nk[i]] = 1;
  var enter=[], update=[], exit=[];
  for (i=0;i<nk.length;i++) (pset[nk[i]] ? update : enter).push(nk[i]);
  for (i=0;i<pk.length;i++) if(!nset[pk[i]]) exit.push(pk[i]);
  return {enter:enter.sort(), update:update.sort(), exit:exit.sort()};
}
function childKeys(v){ return (!v || !v.children) ? [] : v.children.map(function(c){ return c.key; }); }

function planFlip(prev, next, d){
  var pp = positions(prev), np = positions(next), moves=[];
  for (var i=0;i<d.update.length;i++){
    var k = d.update[i], p = pp[k], n = np[k];
    if(!p || !n) continue;
    var dx = p.x - n.x, dy = p.y - n.y;
    if (dx!==0 || dy!==0) moves.push({key:k, dx:dx, dy:dy});
  }
  return moves;
}
function positions(v){
  var out = {}, ch = (v && v.children) || [];
  for (var i=0;i<ch.length;i++){
    var t = String(ch[i].attrs.transform || "");
    var m = /translate\(([-\d.]+),([-\d.]+)\)/.exec(t);
    if (m) out[ch[i].key] = {x:+m[1], y:+m[2]};
  }
  return out;
}

function StepPlayer(steps, opts){ this.steps=steps; this.opts=opts||{}; this.i=0; this.prevTree=null; }
StepPlayer.prototype.goto = function(i){
  i = Math.max(0, Math.min(this.steps.length-1, i));
  var tree = render(this.steps[i]);
  var d = diff(this.prevTree, tree);
  var flip = this.opts.reducedMotion ? [] : (this.prevTree ? planFlip(this.prevTree, tree, d) : []);
  this.i = i; this.prevTree = tree;
  return {tree:tree, diff:d, flip:flip};
};

  });
  if (this.cfg.axis){
    var ax = this.cfg.axis;
    html += '<line class="vz-axis" x1="'+ax.x1+'" y1="'+ax.y+'" x2="'+ax.x2+'" y2="'+ax.y+'"/>';
  }
  chrome.innerHTML = html;
  svg.appendChild(chrome);
  this.edgeLayer = document.createElementNS(SVGNS,"g"); this.edgeLayer.setAttribute("class","vz-layer edges");
  this.nodeLayer = document.createElementNS(SVGNS,"g"); this.nodeLayer.setAttribute("class","vz-layer nodes");
  svg.appendChild(this.edgeLayer); svg.appendChild(this.nodeLayer);
  this.svg = svg; this.stage.appendChild(svg);
};
VizPlayer.prototype.layerFor = function(key){ return key.charAt(0)==="e" ? this.edgeLayer : this.nodeLayer; };

VizPlayer.prototype.applyTree = function(vtree, d, flip){
  var self = this, i;
  for (i=0;i<d.exit.length;i++){
    (function(el){
      if(!el) return;
      if (DUR.exit>0){
        var an = el.animate([{opacity:1},{opacity:0}], {duration:DUR.exit, easing:"ease", fill:"forwards"});
        an.onfinish = function(){ if(el.parentNode) el.parentNode.removeChild(el); };
      } else if (el.parentNode) el.parentNode.removeChild(el);
    })(self.elMap[d.exit[i]]);
    delete self.elMap[d.exit[i]]; delete self.baseMap[d.exit[i]]; delete self.vmap[d.exit[i]];
  }
  for (i=0;i<vtree.children.length;i++){
    var vc = vtree.children[i], key = vc.key, elm = self.elMap[key], b = baseXY(vc);
    if (!elm){ elm = svgEl(vc); self.layerFor(key).appendChild(elm); self.elMap[key]=elm; self.enterAnim(elm, vc); }
    else { self.patch(elm, vc, self.vmap[key]); }
    self.baseMap[key] = b; self.vmap[key] = vc;
  }
  if (!REDUCED){
    for (i=0;i<flip.length;i++){
      var mv = flip[i], g = self.elMap[mv.key]; if(!g) continue;
      var bb = self.baseMap[mv.key];
      g.animate(
        [{transform:"translate("+(bb.x+mv.dx)+"px,"+(bb.y+mv.dy)+"px)"},
         {transform:"translate("+bb.x+"px,"+bb.y+"px)"}],
        {duration:DUR.flip, easing:"cubic-bezier(.2,.7,.2,1)"}
      );
    }
  }
};
VizPlayer.prototype.enterAnim = function(elm, vc){
  if (DUR.enter<=0) return;
  var b = baseXY(vc);
  if (vc.key.charAt(0)==="e"){ elm.animate([{opacity:0},{opacity:1}], {duration:DUR.enter, easing:"ease"}); }
  else {
    elm.animate(
      [{opacity:0, transform:"translate("+b.x+"px,"+b.y+"px) scale(.62)"},
       {opacity:1, transform:"translate("+b.x+"px,"+b.y+"px) scale(1)"}],
      {duration:DUR.enter, easing:"cubic-bezier(.2,.8,.2,1)"}
    );
  }
};
VizPlayer.prototype.patch = function(elm, vc, prevVc){
  for (var k in vc.attrs) elm.setAttribute(k, vc.attrs[k]);
  while (elm.firstChild) elm.removeChild(elm.firstChild);
  var ch = vc.children || [];
  for (var i=0;i<ch.length;i++) elm.appendChild(svgEl(ch[i]));
  var wasAccent = prevVc && /(^|\s)accent(\s|$)/.test(String(prevVc.attrs["class"]||""));
  var isAccent = /(^|\s)accent(\s|$)/.test(String(vc.attrs["class"]||""));
  if (isAccent && !wasAccent && DUR.flash>0){
    elm.animate([{filter:"none"},{filter:"drop-shadow(0 0 7px rgba(240,83,58,.95))"},{filter:"none"}],
               {duration:DUR.flash, easing:"ease"});
  }
};

VizPlayer.prototype.render = function(){
  var idx = this.player.i, res = this.player.goto(idx);
  this.applyTree(res.tree, res.diff, res.flip);
  this.syncUI(this.player.steps[idx], idx);
};
VizPlayer.prototype.syncUI = function(scene, idx){
  var e = this.cfg.els || {};
  if (e.codePanel){
    var lines = e.codePanel.querySelectorAll(".cl-line");
    for (var i=0;i<lines.length;i++) lines[i].classList.toggle("cur", +lines[i].getAttribute("data-line")===scene.codeLine);
  }
  if (e.caption){ var cap=e.caption; cap.style.opacity=0; cap.innerHTML = scene.caption;
    requestAnimationFrame(function(){ cap.style.opacity=1; }); }
  if (e.out){ if (scene.out){ e.out.textContent=scene.out; e.out.classList.add("show"); e.out.classList.toggle("done", scene.out==="завершён"); }
    else { e.out.classList.remove("show","done"); e.out.textContent=""; } }
  if (e.step){ e.step.textContent = lesson.ui.stepFmt.replace("{n}", idx+1).replace("{t}", this.total); }
  if (e.scrub){ var segs=e.scrub.querySelectorAll(".vz-seg");
    for (var j=0;j<segs.length;j++){ segs[j].classList.toggle("cur", j===idx); segs[j].classList.toggle("done", j<idx); } }
  if (e.prev) e.prev.disabled = (idx===0);
  if (e.next) e.next.disabled = (idx===this.total-1);
  if (idx>this.maxIndex) this.maxIndex = idx;
  if (this.cfg.onStep) this.cfg.onStep(this.maxIndex, this.total);
  window.__viz["index"+this.K] = idx;
};

VizPlayer.prototype.goTo = function(i, opts){
  opts = opts || {};
  if (i>=this.gateIndex && !this.predictResolved && !opts.force){ this.showPredict(); return false; }
  this.hidePredict();
  this.player.i = Math.max(0, Math.min(this.total-1, i));
  this.render();
  return true;
};
VizPlayer.prototype.next = function(){ return this.goTo(this.player.i+1); };
VizPlayer.prototype.prev = function(){ this.pause(); return this.goTo(this.player.i-1); };

VizPlayer.prototype.showPredict = function(){
  var e = this.cfg.els || {}; if(!e.predict) return;
  this.pause();
  if (e.predictTitle) e.predictTitle.textContent = lesson.ui.predictTitle;
  if (e.predictQ) e.predictQ.innerHTML = this.cfg.predictQ || "";
  if (e.predictShowTxt) e.predictShowTxt.textContent = lesson.ui.predictShow;
  e.predict.hidden = false; window.__viz.predictVisible = true;
};
VizPlayer.prototype.hidePredict = function(){
  var e = this.cfg.els || {}; if(e.predict) e.predict.hidden = true; window.__viz.predictVisible = false;
};
VizPlayer.prototype.resolvePredict = function(){
  this.predictResolved = true; window.__viz.predictResolved = true;
  this.goTo(this.gateIndex, {force:true});
};

VizPlayer.prototype.play = function(){
  var e = this.cfg.els || {}; if(!e.play) return;
  if (this.player.i >= this.total-1){ this.goTo(0, {force:true}); }
  this.playing = true; this.setPlayIcon(true); window.__viz.playing = true;
  var self = this;
  this.timer = setTimeout(function tick(){
    if(!self.playing) return;
    var target = self.player.i + 1;
    if (target >= self.total){ self.pause(); return; }
    if (target >= self.gateIndex && !self.predictResolved){ self.pause(); self.showPredict(); return; }
    self.goTo(target, {force:true});
    self.timer = setTimeout(tick, 1800);
  }, 1200);
};
VizPlayer.prototype.pause = function(){ this.playing=false; this.setPlayIcon(false); window.__viz.playing=false; if(this.timer){ clearTimeout(this.timer); this.timer=null; } };
VizPlayer.prototype.toggle = function(){ this.playing ? this.pause() : this.play(); };
VizPlayer.prototype.setPlayIcon = function(on){
  var e = this.cfg.els || {}; if(!e.playIcon) return;
  e.playIcon.innerHTML = on
    ? '<rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/>'
    : '<path d="M8 5v14l11-7z"/>';
  if (e.play) e.play.setAttribute("title", on ? "Пауза" : "Проиграть");
};

/* ==========================================================================
   APP wiring: progress, XP.
   ========================================================================== */
var App = {
  xp: 0, maxProgress: 8, mcqDone:false, threadsDone:false, autoplayed:false,
  setProgress:function(pct){
    pct = Math.max(this.maxProgress, Math.min(100, Math.round(pct)));
    this.maxProgress = pct;
    el("lprogFill").style.width = pct + "%";
    window.__viz.progress = pct;
  },
  progressFromViz:function(maxIdx, total){ this.setProgress(8 + (maxIdx+1)/total * 42); },
  progressFromThreads:function(maxIdx, total){
    this.setProgress(70 + (maxIdx+1)/total * 20);
    if (maxIdx===total-1 && !this.threadsDone){ this.threadsDone=true; this.addXp(5); this.setProgress(90); }
  },
  addXp:function(n){
    this.xp += n; el("xpN").textContent = this.xp;
    var chip = el("xpChip"); chip.classList.remove("bump"); void chip.offsetWidth; chip.classList.add("bump");
    window.__viz.xp = this.xp;
  }
};

/* ==========================================================================
   RENDER LESSON — populate every section FROM the `lesson` object.
   ========================================================================== */
function renderLesson(){
  lesson.ui.sections.forEach(function(s){
    var elx = document.querySelector('.sec-label[data-sec="'+s.key+'"]');
    if(elx) elx.innerHTML = '<span class="num">'+s.num+'</span> '+esc(s.label);
  });

  // S1 hook
  el("secHook").innerHTML =
    '<span class="tag-mis">'+ICON.warn+lesson.ui.tagMis+'</span>'+
    '<p class="hook-txt">'+lesson.misconceptions[0].hook+'</p>';

  // S2 code panel
  var cp = "";
  lesson.viz.code.forEach(function(line, i){
    cp += '<div class="cl-line" data-line="'+i+'"><span class="ln">'+(i+1)+'</span><span>'+hlCode(line)+'</span></div>';
  });
  el("codePanel").innerHTML = cp;

  // S2 (woven depth) — sourced track footnotes + inline "Task != Thread" claim
  el("vzNotes").innerHTML = lesson.viz.zoneNotes.map(function(z){
    return '<div class="vz-note'+(z.io?' io':'')+'"><span class="vz-nk">'+esc(z.k)+'</span>'+
           '<div class="vz-nb">'+z.html+srcChips(z.sources)+'</div></div>';
  }).join("");
  el("vzDepth").innerHTML = '<div class="claim-list">'+ lesson.viz.depth.map(claimBlock).join("") +'</div>';

  // S4 ConfigureAwait contrast — title + intro + woven verbatim claim (viz2 built at boot)
  el("thIc").innerHTML = ICON.clock;
  el("thTitle").textContent = lesson.threads.title;
  el("thIntro").innerHTML = lesson.threads.intro;
  el("thClaim").innerHTML = claimBlock(lesson.threads.claim);

  // S5 nuance + woven expert edges (deadlock, ConfigureAwait — verbatim)
  var nu = lesson.nuance;
  el("secNuance").innerHTML =
    '<div class="edge-head"><span class="warn">'+ICON.warn+'</span>'+esc(nu.title)+'</div>'+
    '<p class="edge-body">'+nu.body+'</p>'+
    '<div class="cmp">'+
      '<div class="box bad"><div class="lbl">'+nu.compare.bad.lbl+'</div><div class="desc">'+nu.compare.bad.desc+'</div></div>'+
      '<div class="box good"><div class="lbl">'+nu.compare.good.lbl+'</div><div class="desc">'+nu.compare.good.desc+'</div></div>'+
    '</div>'+ srcChips(nu.sources)+
    '<div class="claim-list" style="margin-top:13px">'+ nu.edges.map(claimBlock).join("") +'</div>';

  // S6 reconstruct
  var t = lesson.takeaways.map(function(x){
    return '<div class="rc-row"><span class="rc-ic '+x.icon+'">'+ICON[x.icon]+'</span>'+
           '<div><div class="rc-k">'+esc(x.k)+'</div><div class="rc-v">'+x.v+'</div></div></div>';
  }).join("");
  var spec = '<div class="rc-spec">'+lesson.spec[0].text+' <span class="rc-specsrc">— '+lesson.ui.specLabel+', '+esc(srcById(lesson.spec[0].source).title)+'</span></div>';
  var edges = '<div class="rc-edges"><div class="rc-edgeh">'+lesson.ui.edgeHead+'</div>'+
              lesson.edgeCases.map(function(e){ return '<div class="rc-edge">'+e.text+'</div>'; }).join("")+'</div>';
  var primary = srcById(lesson.primarySource);
  var srcCard = '<a class="src" href="'+primary.url+'" target="_blank" rel="noopener">'+
      '<span class="sic">'+ICON.book+'</span>'+
      '<span class="sm"><span class="sk">'+lesson.ui.sourceKicker+'</span><span class="st">'+esc(primary.title)+'</span></span>'+
      '<span class="go">'+ICON.ext+'</span></a>';
  var moreIds = lesson.sources.filter(function(s){ return s.id!==lesson.primarySource; }).map(function(s){ return s.id; });
  var more = '<div class="srcmore"><div class="srcmore-h">'+lesson.ui.moreSources+'</div>'+ srcChips(moreIds) +'</div>';
  var next = '<button class="next-cta" id="btnNext">'+lesson.ui.next+ICON.arrowR+'</button>';
  el("secRecon").innerHTML = t + spec + edges + srcCard + more + next;

  el("foot").innerHTML = lesson.ui.foot;
}

/* ==========================================================================
   MCQ (reads lesson.cards[0]).
   ========================================================================== */
function buildMCQ(){
  var card = lesson.cards[0];
  window.__viz.mcqCorrectIndex = card.correctIndex;
  el("qTitle").innerHTML = card.question;
  var wrap = el("qOpts"), check = el("qCheck");
  check.textContent = lesson.ui.check;
  var selected = -1, answered = false;
  var checkSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
  card.options.forEach(function(txt, i){
    var b = document.createElement("button");
    b.className = "opt"; b.type = "button";
    b.innerHTML = '<span class="mk">'+checkSvg+'</span><span class="ot">'+esc(txt)+'</span>';
    b.addEventListener("click", function(){
      if (answered) return;
      selected = i;
      wrap.querySelectorAll(".opt").forEach(function(o){ o.classList.remove("sel"); });
      b.classList.add("sel"); check.disabled = false; window.__viz.mcqSelected = i;
    });
    wrap.appendChild(b);
  });
  check.addEventListener("click", function(){
    if (answered || selected<0) return;
    answered = true;
    var opts = wrap.querySelectorAll(".opt");
    opts.forEach(function(o){ o.classList.add("locked"); });
    var correct = card.correctIndex, banner = el("qBanner"), ok = (selected === correct);
    opts[correct].classList.add("correct");
    if (!ok) opts[selected].classList.add("wrong");
    banner.className = "q-banner show " + (ok ? "ok" : "no");
    el("qbIcon").innerHTML = ok
      ? '<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>'
      : '<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M12 8v5M12 16h.01"/><circle cx="12" cy="12" r="9"/></svg>';
    el("qbTitle").textContent = ok ? lesson.ui.okTitle : lesson.ui.noTitle;
    el("qbText").innerHTML = ok ? card.okText : card.noText;
    var xpBadge = el("qbXp"); check.disabled = true; window.__viz.mcqCorrect = ok;
    if (ok && !App.mcqDone){
      App.mcqDone = true; xpBadge.hidden = false; xpBadge.textContent = "+"+card.xp+" XP";
      App.addXp(card.xp); App.setProgress(70);
    } else { xpBadge.hidden = true; }
  });
}

/* ---- boot ---- */
window.__viz = {index:0, index2:0, progress:8, xp:0, reduced:REDUCED, autoplayTriggered:false, playing:false};
document.addEventListener("DOMContentLoaded", function(){
  document.title = lesson.title + " — Урок · C#";
  renderLesson();

  // ----- viz #1 (async timeline / state machine, with predict gate + code + console + scrubber + play) -----
  var viz = new VizPlayer({
    stage: el("stage"), viewBox: lesson.viz.viewBox, zones: lesson.viz.zones, axis: lesson.viz.axis,
    scenes: lesson.viz.scenes, gateIndex: lesson.viz.predictAt, predictQ: lesson.viz.predictQ,
    vizKey: "",
    els: { caption:el("vzCaption"), out:el("vzOut"), step:el("vzStep"), scrub:el("vzScrub"),
           prev:el("vzPrev"), next:el("vzNext"), play:el("vzPlay"), playIcon:el("vzPlayIcon"),
           predict:el("vzPredict"), predictTitle:el("vzPtitle"), predictQ:el("vzPq"),
           predictShow:el("vzShow"), predictShowTxt:el("vzShowTxt"), codePanel:el("codePanel") },
    onStep: function(maxIdx,total){ App.progressFromViz(maxIdx,total); }
  });
  var scrub = el("vzScrub");
  for (var i=0;i<viz.total;i++){
    (function(idx){
      var seg = document.createElement("button");
      seg.className = "vz-seg"; seg.type="button";
      seg.setAttribute("aria-label", lesson.ui.stepFmt.replace("{n}",idx+1).replace("{t}",viz.total));
      seg.addEventListener("click", function(){ viz.pause(); viz.goTo(idx); });
      scrub.appendChild(seg);
    })(i);
  }
  viz.render();
  window.__viz.viz = viz;
  window.__viz.serializeStep = function(k){ return serialize(render(viz.player.steps[k])); };

  el("vzPrev").addEventListener("click", function(){ viz.prev(); });
  el("vzNext").addEventListener("click", function(){ viz.pause(); viz.next(); });
  el("vzPlay").addEventListener("click", function(){ viz.toggle(); });
  el("vzShow").addEventListener("click", function(){ viz.resolvePredict(); if(!REDUCED) viz.play(); });

  // autoplay hint text
  el("vzAutoHintTxt").textContent = REDUCED ? lesson.ui.autoHintReduced : lesson.ui.autoHint;

  buildMCQ();

  // ----- viz #2 (ConfigureAwait contrast) — SAME engine, new composition -----
  var v2 = lesson.threads.viz2;
  var viz2 = new VizPlayer({
    stage: el("stage2"), viewBox: v2.viewBox, zones: v2.zones, scenes: v2.scenes,
    gateIndex: v2.predictAt, vizKey: "2",
    els: { caption:el("vz2Caption"), step:el("vz2Step"), scrub:el("vz2Scrub"),
           prev:el("vz2Prev"), next:el("vz2Next") },
    onStep: function(maxIdx,total){ App.progressFromThreads(maxIdx,total); }
  });
  var scrub2 = el("vz2Scrub");
  for (var k=0;k<viz2.total;k++){
    (function(idx){
      var seg = document.createElement("button");
      seg.className = "vz-seg"; seg.type="button";
      seg.setAttribute("aria-label", lesson.ui.stepFmt.replace("{n}",idx+1).replace("{t}",viz2.total));
      seg.addEventListener("click", function(){ viz2.goTo(idx); });
      scrub2.appendChild(seg);
    })(k);
  }
  el("vz2Prev").addEventListener("click", function(){ viz2.prev(); });
  el("vz2Next").addEventListener("click", function(){ viz2.next(); });
  viz2.render();
  window.__viz.viz2 = viz2;

  el("btnNext").addEventListener("click", function(){ App.setProgress(100); });
  el("btnClose").addEventListener("click", function(){ App.setProgress(App.maxProgress); });

  App.setProgress(8);

  // ----- AUTOPLAY on scroll-into-view (IntersectionObserver). Respects reduced-motion. -----
  if (REDUCED){
    // reduced-motion: no autoplay; show the FINAL timeline frame statically (predict pre-resolved).
    viz.predictResolved = true; window.__viz.predictResolved = true;
    viz.goTo(viz.total-1, {force:true});
  } else if ("IntersectionObserver" in window){
    var io = new IntersectionObserver(function(entries){
      entries.forEach(function(en){
        if (en.isIntersecting && en.intersectionRatio>=0.35 && !App.autoplayed){
          App.autoplayed = true; window.__viz.autoplayTriggered = true;
          viz.play();
          io.disconnect();
        }
      });
    }, {threshold:[0,0.35,0.6]});
    io.observe(el("stage"));
  } else {
    // no IO support: start on load so the animation still self-starts.
    App.autoplayed = true; window.__viz.autoplayTriggered = true; viz.play();
  }
  window.__viz.ready = true;
});
</script>
