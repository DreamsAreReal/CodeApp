<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Boxing и unboxing — Урок · C#</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;600;700;800&family=Onest:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    /* ---- fixed "mid" design tokens (no hardcoded colors outside these) ---- */
    --bg:#F6F1E9; --surface:#FFFFFF; --ink:#23201B; --muted:#8A8377; --line:#E7DFD2;
    --coral:#F0533A; --coral-l:#FF6A4E; --coral-d:#C43D28; --coral-tint:#FBE7E1; --coral-wash:#FFF8F5;
    --sage:#7C8B6F; --sage-tint:#EAEEE4; --amber:#E8A13A; --amber-tint:#F7E9CF;
    --page-0:#F1E9DB; --page-1:#E9DFCD; --page-2:#E3D8C3;
    --locked-bg:#FCFAF6; --muted-tile:#F1ECE2;
    --shadow-1:0 2px 8px rgba(35,32,27,.06), 0 8px 22px -10px rgba(35,32,27,.10);
    --shadow-2:0 3px 12px rgba(35,32,27,.08), 0 18px 40px -16px rgba(35,32,27,.14);
    --r-s:14px; --r-m:18px; --r-l:22px;
    --display:"Rubik",system-ui,sans-serif;
    --body:"Onest",system-ui,sans-serif;
    --mono:"JetBrains Mono",ui-monospace,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{ -webkit-text-size-adjust:100%; }
  body{
    font-family:var(--body); color:var(--ink);
    background:radial-gradient(120% 80% at 50% -10%, var(--page-0) 0%, var(--page-1) 60%, var(--page-2) 100%);
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:34px 0 40px; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }

  /* ============ MOBILE APP FRAME ~390px ============ */
  .frame{
    width:390px; max-width:100vw; background:var(--bg);
    border-radius:40px; overflow:hidden; position:relative; display:flex; flex-direction:column;
    box-shadow:0 40px 90px -34px rgba(35,32,27,.42), 0 0 0 1px rgba(35,32,27,.04);
  }

  /* ============ LESSON TOP BAR ============ */
  .lbar{ display:flex; align-items:center; gap:12px; padding:16px 16px 10px; }
  .close{
    flex:none; width:32px; height:32px; border-radius:11px; border:1px solid var(--line);
    background:var(--surface); color:var(--muted); cursor:pointer; box-shadow:var(--shadow-1);
    display:flex; align-items:center; justify-content:center; transition:transform .08s ease;
  }
  .close:active{ transform:scale(.94); }
  .close svg{ width:16px; height:16px; }
  .lprog{ flex:1; height:6px; border-radius:5px; background:var(--line); overflow:hidden; }
  .lprog > i{ display:block; height:100%; width:6%; border-radius:5px;
    background:linear-gradient(90deg,var(--coral-l),var(--coral));
    transition:width .5s cubic-bezier(.2,.7,.2,1); }
  .xp{
    flex:none; display:inline-flex; align-items:center; gap:5px; padding:6px 9px;
    background:var(--surface); border:1px solid var(--line); border-radius:11px;
    box-shadow:var(--shadow-1); line-height:1;
  }
  .xp svg{ width:15px; height:15px; color:var(--amber); }
  .xp b{ font-family:var(--mono); font-weight:700; font-size:12.5px; color:var(--ink); }
  .xp .u{ font-size:10.5px; font-weight:500; color:var(--muted); }
  .xp.bump{ animation:xpBump .5s ease; }
  @keyframes xpBump{ 0%{transform:scale(1)} 40%{transform:scale(1.14)} 100%{transform:scale(1)} }

  /* ============ SCROLL BODY ============ */
  .body{ padding:4px 16px 18px; display:flex; flex-direction:column; gap:16px; }

  .card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--r-l);
    padding:18px; box-shadow:var(--shadow-1);
  }
  code, .mono{ font-family:var(--mono); }
  code{ font-size:.92em; background:var(--muted-tile); border-radius:6px; padding:1px 5px; color:var(--ink); }

  /* ---- Section 1 · hook / refutation ---- */
  .hook{ position:relative; overflow:hidden; }
  .hook::before{
    content:""; position:absolute; right:-46px; top:-46px; width:140px; height:140px; border-radius:50%;
    background:radial-gradient(circle, rgba(240,83,58,.12), rgba(240,83,58,0) 70%); pointer-events:none;
  }
  .tag-mis{
    display:inline-flex; align-items:center; gap:6px;
    font-size:10.5px; font-weight:700; letter-spacing:.10em; text-transform:uppercase;
    color:var(--coral); background:var(--coral-tint); padding:4px 9px; border-radius:8px;
  }
  .tag-mis svg{ width:13px; height:13px; }
  .hook-txt{ margin-top:12px; font-size:15px; line-height:1.5; color:var(--ink); font-weight:400; }
  .hook-txt b{ font-weight:700; }
  .hook-txt .wrong{ color:var(--coral-d); font-weight:700; }
  .hook-txt code{ font-size:.9em; }

  /* ---- animated deep-dive segment card ---- */
  .seg{ padding:16px 14px 15px; }
  .seg-head{ display:flex; gap:11px; align-items:flex-start; padding:0 2px; }
  .seg-num{
    flex:none; font-family:var(--mono); font-weight:700; font-size:12px; color:var(--coral);
    background:var(--coral-tint); border-radius:9px; padding:5px 9px; letter-spacing:.02em; margin-top:1px;
  }
  .seg-kicker{ font-size:10px; font-weight:700; letter-spacing:.11em; text-transform:uppercase; color:var(--muted); }
  .seg-title{ margin-top:2px; font-family:var(--display); font-weight:700; font-size:16px; line-height:1.25; color:var(--ink); }

  .code-panel{
    margin-top:13px;
    font-family:var(--mono); font-size:13px; line-height:1; color:var(--ink);
    background:#FBF7F0; border:1px solid var(--line); border-radius:var(--r-m);
    padding:8px; overflow:hidden;
  }
  .cl-line{
    display:flex; align-items:center; gap:9px; padding:6px 8px; border-radius:9px;
    border-left:3px solid transparent; transition:background .25s ease, border-color .25s ease;
    white-space:pre; letter-spacing:-.01em;
  }
  .cl-line .ln{ color:var(--muted); font-size:11px; width:12px; text-align:right; opacity:.7; }
  .cl-line.cur{ background:var(--coral-wash); border-left-color:var(--coral); }
  .cl-line.cur .ln{ color:var(--coral); opacity:1; }
  .tok-ty{ color:var(--sage); font-weight:600; }
  .tok-num{ color:var(--coral-d); font-weight:600; }
  .tok-cls{ color:var(--ink); font-weight:600; }
  .tok-pun{ color:var(--muted); }
  .tok-cmt{ color:var(--muted); font-style:italic; }

  /* ---- IL bytecode panel (machine level) ---- */
  .il-panel{
    margin-top:11px; background:#20242A; border:1px solid #2C333B; border-radius:var(--r-m);
    padding:9px 8px; overflow:hidden;
  }
  .il-head{ display:flex; align-items:center; gap:7px; padding:1px 5px 7px; }
  .il-badge{ font-family:var(--mono); font-size:8.5px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
    color:#20242A; background:#C7D0AE; border-radius:5px; padding:2px 6px; }
  .il-cap{ font-family:var(--mono); font-size:9.5px; color:#8C97A3; }
  .il-line{
    display:flex; align-items:baseline; gap:8px; padding:4px 7px; border-radius:7px;
    border-left:3px solid transparent; white-space:pre; transition:background .25s ease, border-color .25s ease;
    font-family:var(--mono); font-size:12px; letter-spacing:-.01em;
  }
  .il-off{ color:#5C6570; font-size:10px; width:44px; }
  .il-op{ color:#E7EBEF; font-weight:700; }
  .il-arg{ color:#E8A13A; font-weight:600; }
  .il-cmt{ color:#6E7883; font-style:italic; }
  .il-line.cur{ background:rgba(240,83,58,.18); border-left-color:var(--coral-l); }
  .il-line.cur .il-op{ color:#FF8A70; }

  .stage{ margin-top:12px; width:100%; display:block; }
  .stage svg{ width:100%; height:auto; display:block; }

  /* diagram chrome */
  .vz-zone{ fill:#FCFAF6; stroke:var(--line); stroke-width:1.2; }
  .vz-zone.heap{ fill:var(--coral-wash); }
  .vz-zone.good{ fill:var(--sage-tint); }
  .vz-zlabel{ font-family:var(--display); font-size:11px; font-weight:700; letter-spacing:.14em; fill:var(--muted); }
  .vz-zlabel.heap{ fill:var(--coral-d); }
  .vz-zlabel.good{ fill:var(--sage); }
  .vz-zlabel.sm{ font-size:9.5px; letter-spacing:.05em; }
  .vz-zsub{ font-family:var(--mono); font-size:8px; font-weight:600; letter-spacing:.02em; fill:var(--muted); }
  .vz-zsub.heap{ fill:var(--coral-d); opacity:.85; }
  .vz-zsub.good{ fill:var(--sage); opacity:.9; }

  /* data-join nodes */
  .vz-layer text{ pointer-events:none; }
  .vz-slot{ fill:#fff; stroke:var(--line); stroke-width:1.4; }
  .node.accent .vz-slot{ stroke:var(--coral); stroke-width:1.8; }
  .vz-div{ stroke:var(--line); stroke-width:1; }
  .vz-name{ font-family:var(--mono); font-size:14px; font-weight:700; fill:var(--ink); }
  .vz-val{ font-family:var(--mono); font-size:15px; font-weight:700; fill:var(--coral-d); }
  .vz-reflbl{ font-family:var(--mono); font-size:9.5px; font-weight:600; fill:var(--muted); letter-spacing:.04em; }
  .vz-refdot{ fill:var(--coral); }
  .vz-obj{ fill:#fff; stroke:var(--coral); stroke-width:1.6; }
  .node.accent .vz-obj{ stroke:var(--coral-d); stroke-width:2; }
  .node.good .vz-obj{ stroke:var(--sage); }
  .vz-tag{ font-family:var(--mono); font-size:10px; font-weight:600; fill:var(--sage); }
  .vz-objval{ font-family:var(--mono); font-size:18px; font-weight:800; fill:var(--coral-d); }
  .node.good .vz-objval{ fill:var(--sage); }
  .vz-chip{ fill:var(--coral); stroke:var(--coral-d); stroke-width:1; }
  .vz-chipval{ font-family:var(--mono); font-size:13px; font-weight:800; fill:#fff; }
  /* type-check gate */
  .vz-gate{ fill:var(--sage-tint); stroke:var(--sage); stroke-width:1.5; }
  .node.fail .vz-gate{ fill:var(--coral-tint); stroke:var(--coral-d); }
  .vz-gatelbl{ font-family:var(--mono); font-size:9.5px; font-weight:700; fill:var(--sage); }
  .node.fail .vz-gatelbl{ fill:var(--coral-d); }
  .vz-gatedt{ font-family:var(--mono); font-size:11px; font-weight:800; fill:var(--ink); }
  .vz-gateglyph{ font-family:var(--display); font-size:14px; font-weight:800; fill:var(--sage); }
  .node.fail .vz-gateglyph{ fill:var(--coral-d); }
  .edge{ stroke:var(--coral); stroke-width:2; fill:none; }
  .edge.accent{ stroke:var(--coral-d); stroke-width:2.4; }
  .node{ transition:opacity .3s ease; }
  .node.ghost{ opacity:0; }

  /* console */
  .vz-console{
    margin-top:11px; display:flex; align-items:center; gap:8px;
    font-family:var(--mono); font-size:13px; color:var(--ink);
    background:#FBF7F0; border:1px solid var(--line); border-radius:12px; padding:9px 12px; min-height:38px;
  }
  .vz-cprompt{ color:var(--sage); font-weight:700; }
  .vz-clbl{ color:var(--muted); font-size:11px; }
  .vz-cout{ font-weight:700; color:var(--coral-d); font-size:15px; opacity:0; transition:opacity .3s ease; }
  .vz-cout.show{ opacity:1; }
  .vz-caret{ width:7px; height:15px; background:var(--muted); opacity:.35; border-radius:1px;
    animation:blink 1.1s step-end infinite; }
  @keyframes blink{ 50%{opacity:0} }

  /* controls */
  .vz-ctrls{ margin-top:12px; display:flex; align-items:center; gap:9px; }
  .vz-nav, .vz-play{
    flex:none; border:1px solid var(--line); background:var(--surface); cursor:pointer;
    display:flex; align-items:center; justify-content:center; color:var(--ink);
    box-shadow:var(--shadow-1); transition:transform .08s ease;
  }
  .vz-nav{ width:36px; height:36px; border-radius:11px; }
  .vz-nav:active{ transform:scale(.93); }
  .vz-nav:disabled{ opacity:.4; cursor:not-allowed; }
  .vz-nav svg{ width:15px; height:15px; }
  .vz-play{
    width:42px; height:42px; border-radius:13px; border:none; color:#fff;
    background:linear-gradient(180deg,var(--coral-l),var(--coral));
    box-shadow:0 4px 0 var(--coral-d), 0 12px 20px -8px rgba(196,61,40,.5);
  }
  .vz-play:active{ transform:translateY(3px); box-shadow:0 1px 0 var(--coral-d); }
  .vz-play svg{ width:18px; height:18px; }
  .vz-steplabel{ margin-left:2px; font-family:var(--mono); font-size:11.5px; font-weight:600; color:var(--muted); white-space:nowrap; }
  .vz-scrub{ margin-left:auto; display:flex; gap:5px; }
  .vz-seg{ width:20px; height:8px; border-radius:5px; border:none; background:var(--line); cursor:pointer; padding:0; transition:background .2s ease, transform .08s ease; }
  .vz-seg:active{ transform:scaleY(1.3); }
  .vz-seg.done{ background:var(--coral-tint); }
  .vz-seg.cur{ background:var(--coral); }

  /* caption (temporal contiguity) */
  .vz-caption{
    margin-top:13px; font-family:var(--mono); font-size:12px; line-height:1.6; color:var(--muted);
    background:var(--sage-tint); border-radius:12px; padding:11px 13px; min-height:44px;
    transition:opacity .25s ease;
  }
  .vz-caption b{ color:var(--ink); font-weight:700; }
  .vz-caption .hl{ color:var(--coral-d); font-weight:700; }

  /* predict gate */
  .vz-predict{
    margin-top:12px; border:1.5px dashed var(--coral); background:var(--coral-wash);
    border-radius:var(--r-m); padding:14px; text-align:center;
  }
  .vz-predict[hidden]{ display:none; }
  .vz-ptitle{ font-size:10.5px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--coral); }
  .vz-pq{ margin-top:7px; font-size:14.5px; font-weight:500; color:var(--ink); }
  .vz-pq code{ font-size:.9em; }
  .vz-pshow{
    margin-top:12px; border:none; cursor:pointer; font-family:var(--display); font-weight:700; font-size:14px;
    color:#fff; background:linear-gradient(180deg,var(--coral-l),var(--coral)); border-radius:13px; padding:11px 20px;
    display:inline-flex; align-items:center; gap:7px;
    box-shadow:0 4px 0 var(--coral-d), 0 12px 20px -8px rgba(196,61,40,.5); transition:transform .08s ease, box-shadow .08s ease;
  }
  .vz-pshow:active{ transform:translateY(3px); box-shadow:0 1px 0 var(--coral-d); }
  .vz-pshow svg{ width:15px; height:15px; }

  /* mechanism explanation block (verbatim MS Learn quote + source chips) */
  .dd-claim{ border-left:3px solid var(--coral); background:var(--coral-wash);
    border-radius:0 12px 12px 0; padding:11px 13px; margin-top:13px; }
  .dd-claim.sage{ border-left-color:var(--sage); background:var(--sage-tint); }
  .dd-claim.amber{ border-left-color:var(--amber); background:var(--amber-tint); }
  .dd-ctitle{ font-family:var(--display); font-weight:700; font-size:12.5px; color:var(--ink);
    display:flex; gap:7px; align-items:center; }
  .dd-ctitle .n{ font-family:var(--mono); font-size:10.5px; font-weight:700; color:var(--coral);
    background:#fff; border:1px solid var(--line); border-radius:6px; padding:1px 6px; letter-spacing:.02em; }
  .dd-claim.sage .dd-ctitle .n{ color:var(--sage); }
  .dd-ctext{ margin-top:6px; font-size:12.5px; line-height:1.6; color:var(--ink); }
  .dd-ctext b{ font-weight:700; } .dd-ctext .hl{ color:var(--coral-d); font-weight:700; }
  .dd-ctext code{ font-size:.88em; }
  .dd-src{ margin-top:9px; display:flex; flex-wrap:wrap; gap:6px; }
  .dd-src a{ display:inline-flex; align-items:center; gap:5px; text-decoration:none;
    font-family:var(--mono); font-size:9.5px; font-weight:600; color:var(--sage);
    background:#fff; border:1px solid var(--line); border-radius:8px; padding:4px 8px;
    transition:transform .08s ease, border-color .15s ease; }
  .dd-src a:active{ transform:scale(.97); }
  .dd-src a:hover{ border-color:var(--sage); }
  .dd-src svg{ width:11px; height:11px; flex:none; }

  /* ---- MCQ ---- */
  .q-title{ font-family:var(--display); font-weight:700; font-size:16px; color:var(--ink); }
  .q-title code{ font-size:.86em; }
  .opts{ margin-top:13px; display:grid; grid-template-columns:1fr 1fr; gap:9px; }
  .opt{
    border:1.5px solid var(--line); background:var(--surface); border-radius:13px; padding:12px 10px; cursor:pointer;
    display:flex; align-items:center; gap:9px; text-align:left; transition:border-color .15s ease, background .15s ease, transform .08s ease;
  }
  .opt:active{ transform:scale(.98); }
  .opt .mk{
    flex:none; width:20px; height:20px; border-radius:7px; border:1.5px solid var(--line);
    display:flex; align-items:center; justify-content:center; color:transparent;
  }
  .opt .mk svg{ width:12px; height:12px; }
  .opt .ot{ font-family:var(--mono); font-weight:600; font-size:14px; color:var(--ink); }
  .opt.sel{ border-color:var(--coral); background:var(--coral-wash); }
  .opt.sel .mk{ border-color:var(--coral); background:var(--coral); color:#fff; }
  .opt.correct{ border-color:var(--sage); background:var(--sage-tint); }
  .opt.correct .mk{ border-color:var(--sage); background:var(--sage); color:#fff; }
  .opt.wrong{ border-color:var(--coral-d); background:var(--coral-tint); }
  .opt.wrong .mk{ border-color:var(--coral-d); background:var(--coral-d); color:#fff; }
  .opt.locked{ pointer-events:none; }
  .q-check{
    margin-top:13px; width:100%; border:none; cursor:pointer;
    font-family:var(--display); font-weight:700; font-size:15.5px; color:#fff;
    background:linear-gradient(180deg,var(--coral-l),var(--coral)); border-radius:14px; padding:13px;
    box-shadow:0 5px 0 var(--coral-d), 0 14px 24px -8px rgba(196,61,40,.5);
    transition:transform .08s ease, box-shadow .08s ease;
  }
  .q-check:active{ transform:translateY(4px); box-shadow:0 1px 0 var(--coral-d); }
  .q-check:disabled{ opacity:.5; cursor:not-allowed; box-shadow:0 5px 0 var(--coral-d); }
  .q-banner{ margin-top:13px; border-radius:13px; padding:13px 14px; display:none; }
  .q-banner.show{ display:block; animation:bannerIn .3s ease; }
  @keyframes bannerIn{ from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none} }
  .q-banner.ok{ background:var(--sage-tint); border:1px solid rgba(124,139,111,.5); }
  .q-banner.no{ background:var(--coral-tint); border:1px solid rgba(196,61,40,.4); }
  .q-bhead{ font-family:var(--display); font-weight:800; font-size:14.5px; display:flex; align-items:center; gap:8px; }
  .q-banner.ok .q-bhead{ color:var(--sage); }
  .q-banner.no .q-bhead{ color:var(--coral-d); }
  .q-bhead .xpp{ margin-left:auto; font-family:var(--mono); font-size:12px; font-weight:700; color:var(--amber);
    background:var(--amber-tint); border-radius:7px; padding:2px 7px; }
  .q-btext{ margin-top:7px; font-size:13px; line-height:1.5; color:var(--ink); }
  .q-btext b{ font-weight:700; } .q-btext .hl{ color:var(--coral-d); font-weight:700; }
  .q-btext code{ font-size:.86em; }

  /* section mini-label for hook/mcq/recon */
  .sec-label{
    display:flex; align-items:center; gap:10px; padding:6px 2px 0;
    font-size:11px; font-weight:600; letter-spacing:.10em; text-transform:uppercase; color:var(--muted);
  }
  .sec-label .num{
    font-family:var(--mono); font-weight:700; color:var(--coral);
    background:var(--coral-tint); border-radius:6px; padding:2px 6px; font-size:10.5px; letter-spacing:.04em;
  }
  .sec-label::after{ content:""; flex:1; height:1px; background:var(--line); }

  /* ---- reconstruct + sources ---- */
  .rc-row{ display:flex; gap:11px; }
  .rc-row + .rc-row{ margin-top:11px; }
  .rc-ic{ flex:none; width:30px; height:30px; border-radius:10px; display:flex; align-items:center; justify-content:center; }
  .rc-ic.why{ background:var(--coral-tint); color:var(--coral); }
  .rc-ic.cost{ background:var(--amber-tint); color:var(--amber); }
  .rc-ic.avoid{ background:var(--sage-tint); color:var(--sage); }
  .rc-ic svg{ width:17px; height:17px; }
  .rc-k{ font-family:var(--display); font-weight:700; font-size:13.5px; color:var(--ink); }
  .rc-v{ font-size:13px; line-height:1.45; color:var(--muted); margin-top:2px; }

/* shared diagram backdrops (stack / heap) reused across memory-model segments */
var Z_STACK = { x:14,  y:34, w:138, h:168, cls:"vz-zone",      label:"СТЕК ПОТОКА", labelCls:"vz-zlabel",      lx:83,  ly:24, sub:"~1 МБ · Windows", subCls:"vz-zsub", subY:47 };
var Z_HEAP  = { x:188, y:34, w:138, h:168, cls:"vz-zone heap", label:"GC-КУЧА",     labelCls:"vz-zlabel heap", lx:257, ly:24, sub:"общая · процесс", subCls:"vz-zsub heap", subY:47 };

var lesson = {

    { id:"ms-boxing", kind:"doc", org:"Microsoft Learn", title:"Boxing and unboxing (C#)",

    { id:"ms-gc", kind:"doc", org:"Microsoft Learn", title:"Fundamentals of garbage collection",

    { id:"ms-generics", kind:"doc", org:"Microsoft Learn", title:"Generics in .NET",

  // spec + edge cases (reused in the reconstruct section)

  // ---- Section 1 · refuted misconception (the hook) ----
  misconceptions: [
    { wrong:"boxing — это просто каст, дешёвая операция",
      hook:'«<code>object o = i</code> — просто каст» — процессор видит другое. Boxing — это <span class="wrong">аллокация на куче + копия</span>: упакованный <code>int</code> становится отдельным объектом, независимым от слота <code>i</code>, а в IL это отдельный опкод <code>box</code>. Ниже — <b>семь разборов</b>, каждый со своей анимацией и разбором механизма: от трёх действий упаковки и IL-байткода до размещения в памяти, давления на GC и <b>скрытого</b> boxing.',
      source:"ms-boxing" }
  ],

  // ============================================================
  // SEVEN ANIMATED DEEP-DIVE SEGMENTS — each = its own mini-animation
  // (Scene -> FLIP, autoplay on appearance) + mechanism explanation.
  // ============================================================
  segments: [

    // ---- SEG 1 · Boxing mechanics: 3 discrete actions ----
    { id:"s1", num:"01", kicker:"Механика · три действия", title:"Как CLR упаковывает значение",
      viewBox:"0 0 340 210", zones: MM_ZONES,
      code:[ "int i = 123;", "object o = i;" ],
      scenes:[
        { codeLine:0, caption:'Значение <b>123</b> лежит прямо в слоте <b>i</b> на <b>стеке</b> — value-тип живёт inline.',
          nodes:[ {id:"i",kind:"slot",x:83,y:78,w:112,h:40,name:"i",value:"123"} ], edges:[] },
        { codeLine:1, caption:'Действие 1 — <span class="hl">аллокация</span>: CLR создаёт пустую обёртку <code>System.Object</code> на управляемой <b>куче</b>.',
          nodes:[ {id:"i",kind:"slot",x:83,y:78,w:112,h:40,name:"i",value:"123"},
                  {id:"obj",kind:"obj",x:257,y:120,w:112,h:54,typeTag:"[int]",value:"",accent:true},
                  {id:"cp",kind:"chip",x:83,y:78,w:30,h:26,value:"123"} ], edges:[] },
        { codeLine:1, caption:'Действие 2 — <span class="hl">копия</span>: значение переносится со стека <b>внутрь</b> нового объекта (у value-типа семантика значения).',
          nodes:[ {id:"i",kind:"slot",x:83,y:78,w:112,h:40,name:"i",value:"123"},
                  {id:"obj",kind:"obj",x:257,y:120,w:112,h:54,typeTag:"[int]",value:"",accent:true},
                  {id:"cp",kind:"chip",x:257,y:120,w:30,h:26,value:"123"} ], edges:[] },
        { codeLine:1, caption:'Действие 3 — на стеке появляется <b>ссылка</b> <code>o</code> на объект. <code>o</code> хранит ссылку, а не копию значения.',

                  {id:"o",kind:"ref",x:83,y:140,w:112,h:40,name:"o",accent:true},
                  {id:"obj",kind:"obj",x:257,y:120,w:112,h:54,typeTag:"[int]",value:"123",accent:true} ],
          edges:[ {id:"r",from:"o",to:"obj",accent:true} ] }
      ],
      explain:'Упаковка — не каст. CLR <b>аллоцирует новый объект-обёртку на управляемой куче</b> и <span class="hl">копирует</span> в него значение со стека, дословно: «Boxing a value type allocates an object instance on the heap and copies the value into the new object». На стеке остаётся только <b>ссылка</b> <code>o</code>: «an object reference <code>o</code>, on the stack, that references a value of the type <code>int</code>, on the heap … a copy of the value-type value». Копия — потому что у value-типов семантика значения: обёртка обязана владеть собственными данными, а не смотреть на чужой слот.',
      sources:["ms-boxing"] },

    // ---- SEG 2 · Copy != reference: independence ----
    { id:"s2", num:"02", kicker:"Identity · копия ≠ ссылка", title:"Упакованная копия независима",
      viewBox:"0 0 340 210", zones: MM_ZONES,
      code:[ "int i = 123;", "object o = i;", "i = 456;", "Console.WriteLine(o);" ],
      predictAt:2, predictQ:'Что напечатает <code>Console.WriteLine(o)</code> после <code>i = 456</code>?',
      console:true,
      scenes:[
        { codeLine:1, out:"", caption:'После упаковки <b>o</b> ссылается на <span class="hl">независимую копию</span> 123 на куче.',
          nodes:[ {id:"i",kind:"slot",x:83,y:78,w:112,h:40,name:"i",value:"123"},
                  {id:"o",kind:"ref",x:83,y:140,w:112,h:40,name:"o"},
                  {id:"obj",kind:"obj",x:257,y:120,w:112,h:54,typeTag:"[int]",value:"123"} ],

          nodes:[ {id:"i",kind:"slot",x:83,y:78,w:112,h:40,name:"i",value:"456",accent:true},
                  {id:"o",kind:"ref",x:83,y:140,w:112,h:40,name:"o"},
                  {id:"obj",kind:"obj",x:257,y:120,w:112,h:54,typeTag:"[int]",value:"123"} ],
          edges:[ {id:"r",from:"o",to:"obj"} ] },
        { codeLine:3, out:"123", caption:'<b>WriteLine(o)</b> читает объект на куче → печатает <b>123</b>, а не 456.',
          nodes:[ {id:"i",kind:"slot",x:83,y:78,w:112,h:40,name:"i",value:"456"},
                  {id:"o",kind:"ref",x:83,y:140,w:112,h:40,name:"o"},
                  {id:"obj",kind:"obj",x:257,y:120,w:112,h:54,typeTag:"[int]",value:"123",accent:true} ],
          edges:[ {id:"r",from:"o",to:"obj",accent:true} ] }
      ],
      explain:'Раз обёртка держит <b>копию</b>, оригинал и упаковка независимы. Меняем <code>i</code> на 456 — слот на стеке обновился, а объект на куче остался 123: «the original value type and the boxed object use <span class="hl">separate memory locations</span>, and therefore can store different values». Поэтому <code>WriteLine(o)</code> читает кучу и печатает <b>123</b>. Это identity: у boxed-значения своя ячейка, а не алиас переменной.',
      sources:["ms-boxing"] },

    // ---- SEG 3 · Unboxing + strict type-check gate ----
    { id:"s3", num:"03", kicker:"Unboxing · гейт проверки типа", title:"Распаковка проверяет тип строго",
      viewBox:"0 0 340 210", zones: MM_ZONES,
      code:[ "object o = 123;", "int   n = (int)o;", "short s = (short)o;", "int   b = (int)null;" ],
      scenes:[
        { codeLine:0, caption:'<b>o</b> ссылается на boxed <code>int</code> на куче. Дальше распаковываем его тремя способами.',

          nodes:[ {id:"o",kind:"ref",x:83,y:80,w:112,h:40,name:"o"},
                  {id:"gate",kind:"gate",x:170,y:158,w:150,h:44,state:"fail",label:"short ≠ int",detail:"InvalidCastException"},
                  {id:"obj",kind:"obj",x:257,y:100,w:112,h:54,typeTag:"[int]",value:"123"} ],
          edges:[ {id:"r",from:"o",to:"obj"} ] },
        { codeLine:3, caption:'Распаковка <b>null</b>: разыменовывать нечего → <span class="hl">гейт закрыт</span>.',
          nodes:[ {id:"o",kind:"ref",x:83,y:80,w:112,h:40,name:"o",value:"null"},
                  {id:"gate",kind:"gate",x:170,y:158,w:162,h:44,state:"fail",label:"unbox null",detail:"NullReferenceException"} ],
          edges:[] }
      ],
      explain:'Распаковка строгая. Рантайм сначала <b>проверяет</b>, что объект — boxed-значение <span class="hl">ровно того же типа</span>, и только потом копирует значение наружу: «An unboxing operation consists of: Checking the object instance to make sure that it\'s a boxed value of the given value type. Copying the value from the instance into the value-type variable». Несовпадение типа — не тихое сужение, а <code>InvalidCastException</code>; распаковка <code>null</code> — <code>NullReferenceException</code>: «Attempting to unbox <code>null</code> causes a NullReferenceException. Attempting to unbox a reference to an incompatible value type causes an InvalidCastException». Строго — потому что boxed-объект хранит только точный тип, без правил конверсии.',
      sources:["ms-boxing"] },

    // ---- SEG 4 · IL / machine level: box, unbox.any ----
    { id:"s4", num:"04", kicker:"IL · машинный уровень", title:"box и unbox.any в байткоде",
      viewBox:"0 0 340 200", zones: MM_ZONES,
      code:[ "object o = 123;", "int n = (int)o;" ],
      il:[ { off:"IL_0000", op:"ldc.i4.s",  arg:"123",     cmt:"// push int" },

      scenes:[
        { codeLine:0, ilLine:0, caption:'Компилятор кладёт значение на стек вычислений (<code>ldc.i4.s 123</code>).',

          nodes:[ {id:"i",kind:"slot",x:83,y:78,w:112,h:40,name:"eval",value:"123"},

                  {id:"obj",kind:"obj",x:257,y:118,w:112,h:54,typeTag:"[int]",value:"123",accent:true} ],
          edges:[ {id:"r",from:"o",to:"obj",accent:true} ] },
        { codeLine:1, ilLine:4, caption:'Каст <code>(int)o</code> эмитит <span class="hl">unbox.any int32</span> — извлекает значение из коробки в <code>n</code>.',
          nodes:[ {id:"n",kind:"slot",x:83,y:78,w:112,h:40,name:"n",value:"123",accent:true},
                  {id:"o",kind:"ref",x:83,y:138,w:112,h:40,name:"o"},
                  {id:"obj",kind:"obj",x:257,y:118,w:112,h:54,typeTag:"[int]",value:"123"},
                  {id:"cp",kind:"chip",x:257,y:118,w:30,h:26,value:"123"} ],
          edges:[ {id:"r",from:"o",to:"obj"} ] }
      ],
      explain:'На уровне IL упаковка видна буквально. Для <code>object o = i</code> компилятор эмитит опкод <code>box</code> (hex <b>0x8C</b>, формат «box valTypeToken»): «Convert a value type … to a true object reference … creating a new object and copying the data from the value type into the newly allocated object». Для каста <code>(int)o</code> эмитится <code>unbox.any</code> (hex <b>0xA5</b>): «Converts the boxed representation … to its unboxed form», причём «equivalent to <code>unbox</code> followed by <code>ldobj</code>». Операнд обоих — метадата-токен value-типа; эти две инструкции — «отпечаток» упаковки в байткоде.',

/* C#-ish tokenizer for the code panel (data-driven). Comments after // are dimmed. */
function hlCode(line){
  var types = {"int":1,"object":1,"string":1,"bool":1,"double":1,"var":1,"void":1,"long":1,"short":1,"byte":1,"char":1,"float":1,"decimal":1,"uint":1};
  var classes = {"Console":1,"Thread":1,"List":1,"IComparable":1,"N":1};
  var ci = line.indexOf("//"), codePart = line, comment = "";
  if (ci >= 0){ codePart = line.slice(0, ci); comment = line.slice(ci); }
  var re = /([A-Za-z_][A-Za-z0-9_]*)|(\d+)|(\s+)|([^\sA-Za-z0-9_])/g, out="", m;
  while((m = re.exec(codePart))){
    if(m[1]){ var w=m[1];
      if(types[w]) out += '<span class="tok-ty">'+w+'</span>';
      else if(classes[w]) out += '<span class="tok-cls">'+w+'</span>';
      else out += esc(w);
    } else if(m[2]){ out += '<span class="tok-num">'+m[2]+'</span>'; }
    else if(m[3]){ out += m[3]; }
    else { out += '<span class="tok-pun">'+esc(m[4])+'</span>'; }
  }
  if (comment) out += '<span class="tok-cmt">'+esc(comment)+'</span>';
  return out;
}

/* ==========================================================================
   ENGINE — RS-08 living-diagram architecture: declarative Scene ->
   pure render(Scene)->VNode -> keyed data-join diff (enter/update/exit) ->
   planFlip (transform-only invert) -> deterministic StepPlayer. Zero deps.
   The SAME engine drives ALL seven segment animations.
   ========================================================================== */
function render(scene){
  var kids = [], i;
  for (i=0;i<scene.edges.length;i++){
    var e = scene.edges[i];
    var a = findNode(scene.nodes, e.from), b = findNode(scene.nodes, e.to);
    if(!a || !b) continue;
    var x1 = a.x + a.w/2 + 2, y1 = a.y, x2 = b.x - b.w/2 - 6, y2 = b.y;
    kids.push({tag:"line", key:"e:"+e.id, attrs:{
      x1:x1, y1:y1, x2:x2, y2:y2, "marker-end":scene._marker||"url(#vz-arrow)",
      "class": e.accent ? "edge accent" : "edge"
    }});
  }
  for (var j=0;j<scene.nodes.length;j++) kids.push(renderNode(scene.nodes[j]));
  return {tag:"g", key:"root", attrs:{}, children:kids};
}
function findNode(nodes, id){ for(var i=0;i<nodes.length;i++) if(nodes[i].id===id) return nodes[i]; return null; }

function renderNode(n){
  var cls = ["node", n.kind, n.accent?"accent":"", (n.state||""), n.good?"good":"", n.ghost?"ghost":""].filter(Boolean).join(" ");
  var children = [], hw = n.w/2, hh = n.h/2;
  if (n.kind === "slot"){
    children.push({tag:"rect", key:"bx", attrs:{x:-hw, y:-hh, width:n.w, height:n.h, rx:9, "class":"vz-slot"}});
    children.push({tag:"line", key:"dv", attrs:{x1:-hw+38, y1:-hh+5, x2:-hw+38, y2:hh-5, "class":"vz-div"}});
    children.push({tag:"text", key:"nm", attrs:{x:-hw+19, y:5, "text-anchor":"middle", "class":"vz-name"}, text:n.name});
    children.push({tag:"text", key:"vl", attrs:{x:19, y:5, "text-anchor":"middle", "class":"vz-val"}, text:n.value});
  } else if (n.kind === "ref"){
    children.push({tag:"rect", key:"bx", attrs:{x:-hw, y:-hh, width:n.w, height:n.h, rx:9, "class":"vz-slot"}});
    children.push({tag:"line", key:"dv", attrs:{x1:-hw+38, y1:-hh+5, x2:-hw+38, y2:hh-5, "class":"vz-div"}});
    children.push({tag:"text", key:"nm", attrs:{x:-hw+19, y:5, "text-anchor":"middle", "class":"vz-name"}, text:n.name});
    children.push({tag:"text", key:"rl", attrs:{x:8, y:5, "text-anchor":"middle", "class":"vz-reflbl"}, text:(n.value||"ref")});
    if(!n.value) children.push({tag:"circle", key:"dot", attrs:{cx:hw-14, cy:0, r:4, "class":"vz-refdot"}});
  } else if (n.kind === "obj"){
    children.push({tag:"rect", key:"bx", attrs:{x:-hw, y:-hh, width:n.w, height:n.h, rx:11, "class":"vz-obj"}});
    children.push({tag:"text", key:"tg", attrs:{x:0, y:-hh+14, "text-anchor":"middle", "class":"vz-tag"}, text:n.typeTag});
    children.push({tag:"text", key:"ov", attrs:{x:0, y:hh-9, "text-anchor":"middle", "class":"vz-objval"}, text:n.value});
  } else if (n.kind === "chip"){
    children.push({tag:"rect", key:"bx", attrs:{x:-hw, y:-hh, width:n.w, height:n.h, rx:7, "class":"vz-chip"}});
    children.push({tag:"text", key:"cv", attrs:{x:0, y:5, "text-anchor":"middle", "class":"vz-chipval"}, text:n.value});
  } else if (n.kind === "gate"){
    children.push({tag:"rect", key:"bx", attrs:{x:-hw, y:-hh, width:n.w, height:n.h, rx:11, "class":"vz-gate"}});
    children.push({tag:"text", key:"gl", attrs:{x:0, y:-hh+15, "text-anchor":"middle", "class":"vz-gatelbl"}, text:n.label});
    children.push({tag:"text", key:"dt", attrs:{x:0, y:hh-9, "text-anchor":"middle", "class":"vz-gatedt"}, text:n.detail});
  }
  return {tag:"g", key:"n:"+n.id, attrs:{transform:"translate("+n.x+","+n.y+")", "class":cls}, children:children};
}

function serialize(v){
  var keys = Object.keys(v.attrs).sort();
  var a = keys.map(function(k){ return k+'="'+v.attrs[k]+'"'; }).join(" ");
  var open = a ? "<"+v.tag+" "+a+">" : "<"+v.tag+">";
  var inner = (v.text!=null) ? v.text : (v.children||[]).map(serialize).join("");
  return open + inner + "</"+v.tag+">";
}

function diff(prev, next){
  var pk = childKeys(prev), nk = childKeys(next), pset={}, nset={}, i;
  for (i=0;i<pk.length;i++) pset[pk[i]] = 1;
  for (i=0;i<nk.length;i++) nset[nk[i]] = 1;
  var enter=[], update=[], exit=[];
  for (i=0;i<nk.length;i++) (pset[nk[i]] ? update : enter).push(nk[i]);
  for (i=0;i<pk.length;i++) if(!nset[pk[i]]) exit.push(pk[i]);
  return {enter:enter.sort(), update:update.sort(), exit:exit.sort()};
}
function childKeys(v){ return (!v || !v.children) ? [] : v.children.map(function(c){ return c.key; }); }

function planFlip(prev, next, d){
  var pp = positions(prev), np = positions(next), moves=[];
  for (var i=0;i<d.update.length;i++){
    var k = d.update[i], p = pp[k], n = np[k];
    if(!p || !n) continue;
    var dx = p.x - n.x, dy = p.y - n.y;
    if (dx!==0 || dy!==0) moves.push({key:k, dx:dx, dy:dy});
  }
  return moves;
}
function positions(v){
  var out = {}, ch = (v && v.children) || [];
  for (var i=0;i<ch.length;i++){
    var t = String(ch[i].attrs.transform || "");
    var m = /translate\(([-\d.]+),([-\d.]+)\)/.exec(t);
    if (m) out[ch[i].key] = {x:+m[1], y:+m[2]};
  }
  return out;
}

function StepPlayer(steps, opts){ this.steps=steps; this.opts=opts||{}; this.i=0; this.prevTree=null; }
StepPlayer.prototype.goto = function(i){
  i = Math.max(0, Math.min(this.steps.length-1, i));
  var tree = render(this.steps[i]);
  var d = diff(this.prevTree, tree);
  var flip = this.opts.reducedMotion ? [] : (this.prevTree ? planFlip(this.prevTree, tree, d) : []);
  this.i = i; this.prevTree = tree;
  return {tree:tree, diff:d, flip:flip};
};

  chrome.setAttribute("class","vz-chrome");
  var html = "";
  this.cfg.zones = this.cfg.zones || [];
  this.cfg.zones.forEach(function(z){
    html += '<rect class="'+z.cls+'" x="'+z.x+'" y="'+z.y+'" width="'+z.w+'" height="'+z.h+'" rx="14"/>';
    html += '<text class="'+z.labelCls+'" x="'+z.lx+'" y="'+z.ly+'" text-anchor="middle">'+z.label+'</text>';
    if (z.sub) html += '<text class="'+(z.subCls||"vz-zsub")+'" x="'+z.lx+'" y="'+(z.subY!=null?z.subY:(z.y+14))+'" text-anchor="middle">'+z.sub+'</text>';
  });
  chrome.innerHTML = html;
  svg.appendChild(chrome);
  this.edgeLayer = document.createElementNS(SVGNS,"g"); this.edgeLayer.setAttribute("class","vz-layer edges");
  this.nodeLayer = document.createElementNS(SVGNS,"g"); this.nodeLayer.setAttribute("class","vz-layer nodes");
  svg.appendChild(this.edgeLayer); svg.appendChild(this.nodeLayer);
  this.svg = svg; this.stage.appendChild(svg);
};
VizPlayer.prototype.layerFor = function(key){ return key.charAt(0)==="e" ? this.edgeLayer : this.nodeLayer; };

VizPlayer.prototype.applyTree = function(vtree, d, flip){
  var self = this, i;
  for (i=0;i<d.exit.length;i++){
    (function(el){
      if(!el) return;
      if (DUR.exit>0){
        var an = el.animate([{opacity:1},{opacity:0}], {duration:DUR.exit, easing:"ease", fill:"forwards"});
        an.onfinish = function(){ if(el.parentNode) el.parentNode.removeChild(el); };
      } else if (el.parentNode) el.parentNode.removeChild(el);
    })(self.elMap[d.exit[i]]);
    delete self.elMap[d.exit[i]]; delete self.baseMap[d.exit[i]]; delete self.vmap[d.exit[i]];
  }
  for (i=0;i<vtree.children.length;i++){
    var vc = vtree.children[i], key = vc.key, elm = self.elMap[key], b = baseXY(vc);
    if (!elm){ elm = svgEl(vc); self.layerFor(key).appendChild(elm); self.elMap[key]=elm; self.enterAnim(elm, vc); }
    else { self.patch(elm, vc, self.vmap[key]); }
    self.baseMap[key] = b; self.vmap[key] = vc;
  }
  if (!REDUCED){
    for (i=0;i<flip.length;i++){
      var mv = flip[i], g = self.elMap[mv.key]; if(!g) continue;
      var bb = self.baseMap[mv.key];
      g.animate(
        [{transform:"translate("+(bb.x+mv.dx)+"px,"+(bb.y+mv.dy)+"px)"},
         {transform:"translate("+bb.x+"px,"+bb.y+"px)"}],
        {duration:DUR.flip, easing:"cubic-bezier(.2,.7,.2,1)"}
      );
    }
  }
};
VizPlayer.prototype.enterAnim = function(elm, vc){
  if (DUR.enter<=0) return;
  var b = baseXY(vc);
  if (vc.key.charAt(0)==="e"){ elm.animate([{opacity:0},{opacity:1}], {duration:DUR.enter, easing:"ease"}); }
  else {
    elm.animate(
      [{opacity:0, transform:"translate("+b.x+"px,"+b.y+"px) scale(.62)"},
       {opacity:1, transform:"translate("+b.x+"px,"+b.y+"px) scale(1)"}],
      {duration:DUR.enter, easing:"cubic-bezier(.2,.8,.2,1)"}
    );
  }
};
VizPlayer.prototype.patch = function(elm, vc, prevVc){
  for (var k in vc.attrs) elm.setAttribute(k, vc.attrs[k]);
  while (elm.firstChild) elm.removeChild(elm.firstChild);
  var ch = vc.children || [];
  for (var i=0;i<ch.length;i++) elm.appendChild(svgEl(ch[i]));
  var wasAccent = prevVc && /(^|\s)accent(\s|$)/.test(String(prevVc.attrs["class"]||""));
  var isAccent = /(^|\s)accent(\s|$)/.test(String(vc.attrs["class"]||""));
  if (isAccent && !wasAccent && DUR.flash>0){
    elm.animate([{filter:"none"},{filter:"drop-shadow(0 0 7px rgba(240,83,58,.95))"},{filter:"none"}],
               {duration:DUR.flash, easing:"ease"});
  }
};

VizPlayer.prototype.render = function(){
  var idx = this.player.i, res = this.player.goto(idx);
  this.applyTree(res.tree, res.diff, res.flip);
  this.syncUI(this.player.steps[idx], idx);
};
VizPlayer.prototype.syncUI = function(scene, idx){
  var e = this.cfg.els || {};
  if (e.codePanel){
    var lines = e.codePanel.querySelectorAll(".cl-line");
    for (var i=0;i<lines.length;i++) lines[i].classList.toggle("cur", +lines[i].getAttribute("data-line")===scene.codeLine);
  }
  if (e.ilPanel){
    var ils = e.ilPanel.querySelectorAll(".il-line");
    for (var q=0;q<ils.length;q++) ils[q].classList.toggle("cur", +ils[q].getAttribute("data-il")===scene.ilLine);
  }
  if (e.caption){ var cap=e.caption; cap.style.opacity=0; cap.innerHTML = scene.caption;
    requestAnimationFrame(function(){ cap.style.opacity=1; }); }
  if (e.out){ if (scene.out){ e.out.textContent=scene.out; e.out.classList.add("show"); }
    else { e.out.classList.remove("show"); e.out.textContent=""; } }
  if (e.step){ e.step.textContent = lesson.ui.stepFmt.replace("{n}", idx+1).replace("{t}", this.total); }
  if (e.scrub){ var segs=e.scrub.querySelectorAll(".vz-seg");
    for (var j=0;j<segs.length;j++){ segs[j].classList.toggle("cur", j===idx); segs[j].classList.toggle("done", j<idx); } }
  if (e.prev) e.prev.disabled = (idx===0);
  if (e.next) e.next.disabled = (idx===this.total-1);
  if (idx>this.maxIndex) this.maxIndex = idx;
  if (this.cfg.onStep) this.cfg.onStep(this.maxIndex, this.total);
  var st = window.__viz.segments[this.K]; st.index = idx;
};

VizPlayer.prototype.goTo = function(i, opts){
  opts = opts || {};
  if (i>=this.gateIndex && !this.predictResolved && !opts.force){ this.showPredict(); return false; }
  this.hidePredict();
  this.player.i = Math.max(0, Math.min(this.total-1, i));
  this.render();
  return true;
};
VizPlayer.prototype.next = function(){ return this.goTo(this.player.i+1); };
VizPlayer.prototype.prev = function(){ this.pause(); return this.goTo(this.player.i-1); };

VizPlayer.prototype.showPredict = function(){
  var e = this.cfg.els || {}; if(!e.predict) return;
  this.pause();
  if (e.predictTitle) e.predictTitle.textContent = lesson.ui.predictTitle;
  if (e.predictQ) e.predictQ.innerHTML = this.cfg.predictQ || "";
  if (e.predictShowTxt) e.predictShowTxt.textContent = lesson.ui.predictShow;
  e.predict.hidden = false;
};
VizPlayer.prototype.hidePredict = function(){
  var e = this.cfg.els || {}; if(e.predict) e.predict.hidden = true;
};
VizPlayer.prototype.resolvePredict = function(){
  this.predictResolved = true; window.__viz.segments[this.K].predictResolved = true;
  this.goTo(this.gateIndex, {force:true});
};

VizPlayer.prototype.play = function(){
  var e = this.cfg.els || {};
  window.__viz.segments[this.K].played = true;
  if (this.player.i >= this.total-1){ this.goTo(0, {force:true}); }
  this.playing = true; this.setPlayIcon(true);
  var self = this;
  this.timer = setTimeout(function tick(){
    if(!self.playing) return;
    var target = self.player.i + 1;
    if (target >= self.total){ self.pause(); return; }
    if (target >= self.gateIndex && !self.predictResolved){ self.pause(); self.showPredict(); return; }
    self.goTo(target, {force:true});
    self.timer = setTimeout(tick, 1750);
  }, 1150);
};
VizPlayer.prototype.pause = function(){ this.playing=false; this.setPlayIcon(false); if(this.timer){ clearTimeout(this.timer); this.timer=null; } };
VizPlayer.prototype.toggle = function(){ this.playing ? this.pause() : this.play(); };
VizPlayer.prototype.setPlayIcon = function(on){
  var e = this.cfg.els || {}; if(!e.playIcon) return;
  e.playIcon.innerHTML = on
    ? '<rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/>'
    : '<path d="M8 5v14l11-7z"/>';
  if (e.play) e.play.setAttribute("title", on ? "Пауза" : "Проиграть");
};

/* ==========================================================================
   APP wiring: progress, XP. Progress advances as segments are completed.
   ========================================================================== */
var App = {
  xp: 0, maxProgress: 6, mcqDone:false, segDone:{}, segTotal:0,
  setProgress:function(pct){
    pct = Math.max(this.maxProgress, Math.min(100, Math.round(pct)));
    this.maxProgress = pct;
    el("lprogFill").style.width = pct + "%";
    window.__viz.progress = pct;
  },
  segProgress:function(){
    var done = Object.keys(this.segDone).length;
    this.setProgress(6 + (done/this.segTotal) * 78);
  },
  markSeg:function(id){
    if (this.segDone[id]) return;
    this.segDone[id] = true; this.addXp(2); this.segProgress();
  },
  addXp:function(n){
    this.xp += n; el("xpN").textContent = this.xp;
    var chip = el("xpChip"); chip.classList.remove("bump"); void chip.offsetWidth; chip.classList.add("bump");
    window.__viz.xp = this.xp;
  }
};

/* ==========================================================================
   Build one animated segment card from data; return its VizPlayer.
   ========================================================================== */
function buildSegment(seg){
  var card = document.createElement("section");
  card.className = "card seg"; card.setAttribute("data-seg", seg.id);

  var codeHTML = "";
  if (seg.code){
    codeHTML = '<div class="code-panel">' + seg.code.map(function(line,i){
      return '<div class="cl-line" data-line="'+i+'"><span class="ln">'+(i+1)+'</span><span>'+hlCode(line)+'</span></div>';
    }).join("") + '</div>';
  }
  var ilHTML = "";
  if (seg.il){
    ilHTML = '<div class="il-panel"><div class="il-head"><span class="il-badge">'+lesson.ui.ilBadge+'</span><span class="il-cap">'+lesson.ui.ilCap+'</span></div>' +
      seg.il.map(function(l,i){
        return '<div class="il-line" data-il="'+i+'"><span class="il-off">'+esc(l.off)+'</span><span class="il-op">'+esc(l.op)+'</span>'+
               (l.arg?'<span class="il-arg">'+esc(l.arg)+'</span>':'')+
               (l.cmt?'<span class="il-cmt">'+esc(l.cmt)+'</span>':'')+'</div>';
      }).join("") + '</div>';
  }
  var predictHTML = "";
  if (seg.predictAt != null){
    predictHTML =
      '<div class="vz-predict" hidden>'+
        '<div class="vz-ptitle"></div>'+
        '<div class="vz-pq"></div>'+
        '<button class="vz-pshow" type="button"><span></span>'+
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h13"/><path d="M13 6l6 6-6 6"/></svg>'+
        '</button>'+
      '</div>';
  }
  var consoleHTML = "";
  if (seg.console){
    consoleHTML = '<div class="vz-console"><span class="vz-cprompt">›</span><span class="vz-clbl">консоль</span>'+
                  '<span class="vz-cout"></span><span class="vz-caret"></span></div>';
  }

  card.innerHTML =
    '<div class="seg-head"><span class="seg-num">'+esc(seg.num)+'</span>'+
      '<div><div class="seg-kicker">'+esc(seg.kicker)+'</div><div class="seg-title">'+esc(seg.title)+'</div></div></div>'+
    codeHTML + ilHTML +
    '<div class="stage" aria-label="'+esc(seg.title)+'"></div>'+
    consoleHTML + predictHTML +
    '<div class="vz-ctrls">'+
      '<button class="vz-nav vz-prev" type="button" title="Назад" aria-label="Назад"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg></button>'+
      '<button class="vz-play" type="button" title="Проиграть" aria-label="Проиграть"><svg class="vz-playicon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>'+
      '<button class="vz-nav vz-next" type="button" title="Вперёд" aria-label="Вперёд"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></button>'+
      '<div class="vz-steplabel"></div>'+
      '<div class="vz-scrub" role="group" aria-label="Шаги"></div>'+
    '</div>'+
    '<div class="vz-caption"></div>'+
    claimBlock({ tone:"sage", n:"↳", title:"Механизм — как и почему", html:seg.explain, sources:seg.sources });

  var q = function(sel){ return card.querySelector(sel); };
  var els = {
    caption: q(".vz-caption"),
    step: q(".vz-steplabel"),
    scrub: q(".vz-scrub"),
    prev: q(".vz-prev"),
    next: q(".vz-next"),
    play: q(".vz-play"),
    playIcon: q(".vz-playicon"),
    codePanel: seg.code ? q(".code-panel") : null,
    ilPanel: seg.il ? q(".il-panel") : null,
    out: seg.console ? q(".vz-cout") : null
  };
  if (seg.predictAt != null){
    els.predict = q(".vz-predict");
    els.predictTitle = q(".vz-ptitle");
    els.predictQ = q(".vz-pq");
    els.predictShow = q(".vz-pshow");
    els.predictShowTxt = q(".vz-pshow span");
  }

  var viz = new VizPlayer({
    stage: q(".stage"), viewBox: seg.viewBox, zones: seg.zones, scenes: seg.scenes,
    gateIndex: seg.predictAt, predictQ: seg.predictQ, vizKey: seg.id, els: els,
    onStep: function(maxIdx,total){ if (maxIdx===total-1) App.markSeg(seg.id); }
  });

  // scrubber
  for (var i=0;i<viz.total;i++){
    (function(idx){
      var s = document.createElement("button");
      s.className = "vz-seg"; s.type="button";
      s.setAttribute("aria-label", (idx+1)+"/"+viz.total);
      s.addEventListener("click", function(){ viz.pause(); viz.goTo(idx); });
      els.scrub.appendChild(s);
    })(i);
  }
  els.prev.addEventListener("click", function(){ viz.prev(); });
  els.next.addEventListener("click", function(){ viz.pause(); viz.next(); });
  els.play.addEventListener("click", function(){ viz.toggle(); });
  if (els.predictShow) els.predictShow.addEventListener("click", function(){ viz.resolvePredict(); if(!REDUCED) viz.play(); });

  viz.render();
  window.__viz.vizByKey[seg.id] = viz;
  return { viz:viz, card:card };
}

/* ==========================================================================
   MCQ (reads lesson.cards[0]).
   ========================================================================== */
function buildMCQ(){
  var card = lesson.cards[0];
  window.__viz.mcqCorrectIndex = card.correctIndex;
  el("qTitle").innerHTML = card.question;
  var wrap = el("qOpts"), check = el("qCheck");
  check.textContent = lesson.ui.check;
  var selected = -1, answered = false;
  var checkSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
  card.options.forEach(function(txt, i){
    var b = document.createElement("button");
    b.className = "opt"; b.type = "button";
    b.innerHTML = '<span class="mk">'+checkSvg+'</span><span class="ot">'+esc(txt)+'</span>';
    b.addEventListener("click", function(){
      if (answered) return;
      selected = i;
      wrap.querySelectorAll(".opt").forEach(function(o){ o.classList.remove("sel"); });
      b.classList.add("sel"); check.disabled = false; window.__viz.mcqSelected = i;
    });
    wrap.appendChild(b);
  });
  check.addEventListener("click", function(){
    if (answered || selected<0) return;
    answered = true;
    var opts = wrap.querySelectorAll(".opt");
    opts.forEach(function(o){ o.classList.add("locked"); });
    var correct = card.correctIndex, banner = el("qBanner"), ok = (selected === correct);
    opts[correct].classList.add("correct");
    if (!ok) opts[selected].classList.add("wrong");
    banner.className = "q-banner show " + (ok ? "ok" : "no");
    el("qbIcon").innerHTML = ok
      ? '<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>'
      : '<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M12 8v5M12 16h.01"/><circle cx="12" cy="12" r="9"/></svg>';
    el("qbTitle").textContent = ok ? lesson.ui.okTitle : lesson.ui.noTitle;
    el("qbText").innerHTML = ok ? card.okText : card.noText;
    var xpBadge = el("qbXp"); check.disabled = true; window.__viz.mcqCorrect = ok;
    if (ok && !App.mcqDone){
      App.mcqDone = true; xpBadge.hidden = false; xpBadge.textContent = "+"+card.xp+" XP";
      App.addXp(card.xp); App.setProgress(Math.max(App.maxProgress, 88));
    } else { xpBadge.hidden = true; }
  });
}

/* ==========================================================================
   RENDER static sections (hook, labels, reconstruct, foot).
   ========================================================================== */
function renderStatic(){
  el("lblHook").innerHTML  = '<span class="num">'+ ICONnum("H") +'</span> '+esc(lesson.ui.hookLabel);
  el("lblMcq").innerHTML   = '<span class="num">✓</span> '+esc(lesson.ui.mcqLabel);
  el("lblRecon").innerHTML = '<span class="num">Σ</span> '+esc(lesson.ui.reconLabel);

  el("secHook").innerHTML =
    '<span class="tag-mis">'+ICON.warn+lesson.ui.tagMis+'</span>'+
    '<p class="hook-txt">'+lesson.misconceptions[0].hook+'</p>';

  var t = lesson.takeaways.map(function(x){
    return '<div class="rc-row"><span class="rc-ic '+x.icon+'">'+ICON[x.icon]+'</span>'+
           '<div><div class="rc-k">'+esc(x.k)+'</div><div class="rc-v">'+x.v+'</div></div></div>';
  }).join("");
  var spec = '<div class="rc-spec">'+lesson.spec[0].text+' <span class="rc-specsrc">— '+lesson.ui.specLabel+', '+esc(srcById(lesson.spec[0].source).title)+'</span></div>';
  var edges = '<div class="rc-edges"><div class="rc-edgeh">'+lesson.ui.edgeHead+'</div>'+
              lesson.edgeCases.map(function(e){ return '<div class="rc-edge">'+e.text+'</div>'; }).join("")+'</div>';
  var primary = srcById("ms-boxing");
  var srcCard = '<a class="src" href="'+primary.url+'" target="_blank" rel="noopener">'+
      '<span class="sic">'+ICON.book+'</span>'+
      '<span class="sm"><span class="sk">'+lesson.ui.sourceKicker+'</span><span class="st">'+esc(primary.title)+'</span></span>'+
      '<span class="go">'+ICON.ext+'</span></a>';
  var moreIds = lesson.sources.filter(function(s){ return s.id!=="ms-boxing"; }).map(function(s){ return s.id; });
  var more = '<div class="srcmore"><div class="srcmore-h">'+lesson.ui.moreSources+'</div>'+ srcChips(moreIds) +'</div>';
  var next = '<button class="next-cta" id="btnNext">'+lesson.ui.next+ICON.arrowR+'</button>';
  el("secRecon").innerHTML = t + spec + edges + srcCard + more + next;

  el("foot").innerHTML = lesson.ui.foot;
}
function ICONnum(s){ return esc(s); }

/* ---- boot ---- */
window.__viz = { progress:6, xp:0, reduced:REDUCED, segments:{}, vizByKey:{}, ready:false };
document.addEventListener("DOMContentLoaded", function(){
  document.title = lesson.title + " — Урок · C#";
  renderStatic();

  App.segTotal = lesson.segments.length;
  var hostTop = el("segHostTop"), hostRest = el("segHostRest");
  var built = [];
  lesson.segments.forEach(function(seg, i){
    var b = buildSegment(seg);
    (i < 2 ? hostTop : hostRest).appendChild(b.card);
    built.push(b);
  });

  buildMCQ();

  el("btnNext").addEventListener("click", function(){ App.setProgress(100); });
  el("btnClose").addEventListener("click", function(){ App.setProgress(App.maxProgress); });

  App.setProgress(6);

  // ----- AUTOPLAY on scroll-into-view (IntersectionObserver), per segment. -----
  if (REDUCED){
    // reduced-motion: no autoplay; show each segment's FINAL frame statically (predict pre-resolved).
    built.forEach(function(b){
      b.viz.predictResolved = true; window.__viz.segments[b.viz.K].predictResolved = true;
      b.viz.goTo(b.viz.total-1, {force:true});
      App.markSeg(b.viz.K);
    });
  } else if ("IntersectionObserver" in window){
    built.forEach(function(b){
      var started = false;
      var io = new IntersectionObserver(function(entries){
        entries.forEach(function(en){
          if (en.isIntersecting && en.intersectionRatio>=0.35 && !started){
            started = true; b.viz.play(); io.disconnect();
          }
        });
      }, {threshold:[0,0.35,0.6]});
      io.observe(b.card.querySelector(".stage"));
    });
  } else {
    built.forEach(function(b){ b.viz.play(); });
  }

  // headless helper: force-play a segment (or all) to the end, resolving predicts.
  window.__viz.forcePlay = function(key){
    var b = window.__viz.vizByKey[key]; if(!b) return false;
    b.predictResolved = true; window.__viz.segments[key].predictResolved = true;
    b.goTo(b.total-1, {force:true}); return true;
  };
  window.__viz.forcePlayAll = function(){ Object.keys(window.__viz.vizByKey).forEach(window.__viz.forcePlay); };
  window.__viz.ready = true;
});
</script>
