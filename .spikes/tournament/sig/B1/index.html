<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Python Bytecode Frame - Signature Element</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600&family=Onest:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Rubik', sans-serif;
      background: #F6F1E9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .viewport {
      width: 390px;
      background: #F6F1E9;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
    }

    .container {
      background: #fff;
      padding: 24px;
      border-radius: 18px;
      margin: 16px;
    }

    /* Code block */
    .code-block {
      background: #fff;
      border: 1px solid #E7DFD2;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
      color: #23201B;
    }

    .code-line {
      display: flex;
      align-items: center;
      padding: 4px 0;
    }

    .code-line.var-x { color: #23201B; }
    .code-line.var-y { color: #23201B; }

    .keyword { color: #7C8B6F; font-weight: 600; }
    .number { color: #F0533A; font-weight: 600; }
    .identifier { color: #23201B; }

    /* Diagram container */
    .diagram-wrapper {
      background: #fff;
      border: 1px solid #E7DFD2;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 20px;
      overflow: auto;
    }

    .diagram-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      min-height: 200px;
      width: 100%;
    }

    /* Frame section (Names) */
    .frame-section {
      border-right: 2px solid #E7DFD2;
      padding-right: 16px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #8A8377;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
      font-family: 'Onest', sans-serif;
    }

    .slot {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      position: relative;
    }

    .slot-name {
      min-width: 24px;
      font-weight: 600;
      font-size: 13px;
      color: #23201B;
      font-family: 'JetBrains Mono', monospace;
    }

    .slot-arrow {
      flex: 1;
      height: 2px;
      background: linear-gradient(to right, #7C8B6F 0%, #7C8B6F 90%, transparent 100%);
      position: relative;
    }

    .slot-arrow::after {
      content: '';
      position: absolute;
      right: -6px;
      top: -4px;
      width: 0;
      height: 0;
      border-left: 6px solid #7C8B6F;
      border-top: 4px solid transparent;
      border-bottom: 4px solid transparent;
    }

    /* Heap section (Objects) */
    .heap-section {
      display: flex;
      flex-direction: column;
    }

    .object-box {
      background: #F6F1E9;
      border: 2px solid #E7DFD2;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }

    .object-type {
      font-weight: 600;
      color: #7C8B6F;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .object-value {
      font-size: 16px;
      font-weight: 600;
      color: #F0533A;
      margin-bottom: 8px;
    }

    .object-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: #8A8377;
    }

    .ref-chip {
      background: #fff;
      border: 1px solid #E7DFD2;
      border-radius: 8px;
      padding: 4px 8px;
      font-weight: 500;
      font-family: 'Onest', sans-serif;
    }

    /* Diagram caption */
    .diagram-caption {
      font-size: 12px;
      color: #8A8377;
      text-align: center;
      margin-top: 12px;
      font-style: italic;
      font-family: 'Onest', sans-serif;
    }

    /* Bytecode panel */
    .bytecode-panel {
      background: #2B2622;
      border-radius: 14px;
      padding: 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1.8;
      color: #D4CCBE;
      margin-bottom: 0;
    }

    .bytecode-header {
      font-size: 10px;
      font-weight: 600;
      color: #8A8377;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
      font-family: 'Onest', sans-serif;
    }

    .bytecode-line {
      display: flex;
      gap: 16px;
      padding: 6px 0;
      transition: background 0.2s;
    }

    .bytecode-line.active {
      background: rgba(240, 83, 58, 0.15);
      padding: 6px 8px;
      margin: 0 -8px;
      border-radius: 6px;
      color: #F0533A;
      font-weight: 600;
    }

    .bytecode-index {
      min-width: 24px;
      color: #8A8377;
      text-align: right;
    }

    .bytecode-instr {
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="viewport">
    <div class="container">
      <!-- Code block -->
      <div class="code-block">
        <div class="code-line var-x">
          <span class="identifier">x</span><span class="keyword"> = </span><span class="number">257</span>
        </div>
        <div class="code-line var-y">
          <span class="identifier">y</span><span class="keyword"> = </span><span class="identifier">x</span>
        </div>
      </div>

      <!-- Diagram -->
      <div class="diagram-wrapper">
        <svg viewBox="0 0 340 200" width="100%" height="200" style="display: none;">
          <!-- Placeholder for future animated connections -->
        </svg>

        <div class="diagram-grid">
          <!-- Frame (Names) section -->
          <div class="frame-section">
            <div class="section-title">Names (frame)</div>

            <div class="slot">
              <div class="slot-name">x</div>
              <div class="slot-arrow"></div>
            </div>

            <div class="slot">
              <div class="slot-name">y</div>
              <div class="slot-arrow"></div>
            </div>
          </div>

          <!-- Heap (Objects) section -->
          <div class="heap-section">
            <div class="section-title">Objects (heap)</div>

            <div class="object-box">
              <div class="object-type">int</div>
              <div class="object-value">257</div>
              <div class="object-meta">
                <span class="ref-chip">refs: 2</span>
              </div>
            </div>
          </div>
        </div>

        <div class="diagram-caption">
          Variables x and y both reference the same integer object in memory
        </div>
      </div>

      <!-- Bytecode panel -->
      <div class="bytecode-panel">
        <div class="bytecode-header">dis · bytecode</div>

        <div class="bytecode-line active">
          <div class="bytecode-index">0</div>
          <div class="bytecode-instr">LOAD_CONST 257</div>
        </div>

        <div class="bytecode-line">
          <div class="bytecode-index">2</div>
          <div class="bytecode-instr">STORE_NAME x</div>
        </div>

        <div class="bytecode-line">
          <div class="bytecode-index">4</div>
          <div class="bytecode-instr">STORE_NAME y</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
