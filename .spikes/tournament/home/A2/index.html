<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini App Home - A2 Track Switcher</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@700;800&family=Onest:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Onest', sans-serif;
            background-color: #F6F1E9;
            color: #23201B;
            overflow-x: hidden;
        }

        /* Viewport container for mobile mockup */
        .viewport {
            width: 390px;
            height: 844px;
            margin: 0 auto;
            background: #fff;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Screen wrapper for toggling visibility */
        .screen {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            display: none;
            flex-direction: column;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .screen.active {
            display: flex;
        }

        /* Header section */
        .header {
            padding: 20px 16px 16px;
            background: #fff;
            border-bottom: 1px solid #E7DFD2;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .header-title {
            font-family: 'Rubik', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: #23201B;
            letter-spacing: -0.5px;
        }

        .header-icon {
            width: 32px;
            height: 32px;
            background: #F6F1E9;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .header-icon svg {
            width: 18px;
            height: 18px;
            stroke: #23201B;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Segment control */
        .segment-control {
            display: flex;
            gap: 8px;
            background: #F6F1E9;
            padding: 4px;
            border-radius: 14px;
            width: fit-content;
            margin: 0 auto;
        }

        .segment-btn {
            padding: 8px 20px;
            border: none;
            background: transparent;
            border-radius: 12px;
            font-family: 'Onest', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: #8A8377;
            cursor: pointer;
            transition: all 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
            letter-spacing: -0.2px;
        }

        .segment-btn.active {
            background: #F0533A;
            color: #fff;
            box-shadow: 0 4px 12px rgba(240, 83, 58, 0.25);
        }

        .segment-btn:hover:not(.active) {
            color: #23201B;
        }

        /* Content area */
        .content {
            flex: 1;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Track header/info */
        .track-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 4px;
        }

        .track-title {
            font-family: 'Rubik', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: #8A8377;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .track-count {
            font-family: 'Onest', sans-serif;
            font-size: 12px;
            font-weight: 500;
            color: #8A8377;
        }

        /* Lesson card */
        .lesson-card {
            background: #fff;
            border: 1px solid #E7DFD2;
            border-radius: 18px;
            padding: 16px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transition: all 0.24s ease;
            cursor: pointer;
        }

        .lesson-card:active {
            transform: scale(0.98);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .lesson-card:hover {
            border-color: #D8C8BC;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
        }

        .lesson-icon {
            width: 48px;
            height: 48px;
            min-width: 48px;
            background: #F6F1E9;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .lesson-icon svg {
            width: 24px;
            height: 24px;
            stroke: #F0533A;
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .lesson-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .lesson-number {
            font-family: 'Onest', sans-serif;
            font-size: 11px;
            font-weight: 600;
            color: #F0533A;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .lesson-name {
            font-family: 'Rubik', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: #23201B;
            line-height: 1.3;
        }

        .lesson-meta {
            font-family: 'Onest', sans-serif;
            font-size: 12px;
            color: #8A8377;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .lesson-meta-dot {
            width: 3px;
            height: 3px;
            background: #8A8377;
            border-radius: 50%;
        }

        /* Badge for new lessons */
        .badge-new {
            background: #7C8B6F;
            color: #fff;
            font-family: 'Onest', sans-serif;
            font-size: 9px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.2px;
            margin-left: auto;
        }

        /* Comparison frame */
        .frame-divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, #E7DFD2, transparent);
            margin: 12px 0;
        }

        .frame-label {
            text-align: center;
            font-family: 'Onest', sans-serif;
            font-size: 11px;
            font-weight: 600;
            color: #8A8377;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            padding: 8px 0;
        }

        /* Scrollbar styling (webkit) */
        .screen::-webkit-scrollbar {
            width: 4px;
        }

        .screen::-webkit-scrollbar-track {
            background: transparent;
        }

        .screen::-webkit-scrollbar-thumb {
            background: #D8C8BC;
            border-radius: 2px;
        }

        .screen::-webkit-scrollbar-thumb:hover {
            background: #8A8377;
        }

        /* Layout for demo view */
        .demo-wrapper {
            display: flex;
            gap: 20px;
            padding: 20px;
            background: #F6F1E9;
            min-height: 100vh;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        .viewport-label {
            position: absolute;
            top: 4px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Onest', sans-serif;
            font-size: 8px;
            color: #8A8377;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            z-index: 20;
        }
    </style>
</head>
<body>
    <div class="demo-wrapper">
        <!-- Python Track Screen -->
        <div class="viewport">
            <div class="viewport-label">Python Active</div>
            <div class="screen active" id="python-screen">
                <div class="header">
                    <div class="header-top">
                        <div class="header-title">Уроки</div>
                        <div class="header-icon">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="12" cy="12" r="1"/>
                                <circle cx="12" cy="5" r="1"/>
                                <circle cx="12" cy="19" r="1"/>
                            </svg>
                        </div>
                    </div>
                    <div class="segment-control">
                        <button class="segment-btn active" onclick="switchTrack('python')">Python</button>
                        <button class="segment-btn" onclick="switchTrack('csharp')">C#</button>
                    </div>
                </div>
                <div class="content">
                    <div class="track-header">
                        <span class="track-title">Python</span>
                        <span class="track-count">3 урока</span>
                    </div>

                    <!-- Lesson 1 -->
                    <div class="lesson-card">
                        <div class="lesson-icon">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <rect x="4" y="6" width="16" height="12" rx="2"/>
                                <path d="M8 10h8M8 14h6"/>
                            </svg>
                        </div>
                        <div class="lesson-content">
                            <span class="lesson-number">Урок 1</span>
                            <span class="lesson-name">Имена и объекты</span>
                            <div class="lesson-meta">
                                <span>15 мин</span>
                                <span class="lesson-meta-dot"></span>
                                <span>Новое</span>
                            </div>
                        </div>
                        <span class="badge-new">NEW</span>
                    </div>

                    <!-- Lesson 2 -->
                    <div class="lesson-card">
                        <div class="lesson-icon">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 2v7M12 13v7M6 8l5 5 5-5M6 16l5-5 5 5"/>
                            </svg>
                        </div>
                        <div class="lesson-content">
                            <span class="lesson-number">Урок 2</span>
                            <span class="lesson-name">Декораторы</span>
                            <div class="lesson-meta">
                                <span>22 мин</span>
                                <span class="lesson-meta-dot"></span>
                                <span>Новое</span>
                            </div>
                        </div>
                        <span class="badge-new">NEW</span>
                    </div>

                    <!-- Lesson 3 -->
                    <div class="lesson-card">
                        <div class="lesson-icon">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm-2 10l4-3 4 3v-2l-4 3-4-3v2z"/>
                            </svg>
                        </div>
                        <div class="lesson-content">
                            <span class="lesson-number">Урок 3</span>
                            <span class="lesson-name">Генераторы</span>
                            <div class="lesson-meta">
                                <span>18 мин</span>
                                <span class="lesson-meta-dot"></span>
                                <span>Новое</span>
                            </div>
                        </div>
                        <span class="badge-new">NEW</span>
                    </div>
                </div>
            </div>

            <!-- C# Track Screen -->
            <div class="screen" id="csharp-screen">
                <div class="header">
                    <div class="header-top">
                        <div class="header-title">Уроки</div>
                        <div class="header-icon">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="12" cy="12" r="1"/>
                                <circle cx="12" cy="5" r="1"/>
                                <circle cx="12" cy="19" r="1"/>
                            </svg>
                        </div>
                    </div>
                    <div class="segment-control">
                        <button class="segment-btn" onclick="switchTrack('python')">Python</button>
                        <button class="segment-btn active" onclick="switchTrack('csharp')">C#</button>
                    </div>
                </div>
                <div class="content">
                    <div class="track-header">
                        <span class="track-title">C#</span>
                        <span class="track-count">3 урока</span>
                    </div>

                    <!-- Lesson 1 -->
                    <div class="lesson-card">
                        <div class="lesson-icon">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <rect x="4" y="6" width="16" height="12" rx="2"/>
                                <path d="M8 10h8M8 14h6"/>
                            </svg>
                        </div>
                        <div class="lesson-content">
                            <span class="lesson-number">Урок 1</span>
                            <span class="lesson-name">Значения и ссылки</span>
                            <div class="lesson-meta">
                                <span>20 мин</span>
                                <span class="lesson-meta-dot"></span>
                                <span>Пройдён</span>
                            </div>
                        </div>
                    </div>

                    <!-- Lesson 2 -->
                    <div class="lesson-card">
                        <div class="lesson-icon">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 2v7M12 13v7M6 8l5 5 5-5M6 16l5-5 5 5"/>
                            </svg>
                        </div>
                        <div class="lesson-content">
                            <span class="lesson-number">Урок 2</span>
                            <span class="lesson-name">Boxing</span>
                            <div class="lesson-meta">
                                <span>17 мин</span>
                                <span class="lesson-meta-dot"></span>
                                <span>В прогрессе 60%</span>
                            </div>
                        </div>
                    </div>

                    <!-- Lesson 3 -->
                    <div class="lesson-card">
                        <div class="lesson-icon">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm-2 10l4-3 4 3v-2l-4 3-4-3v2z"/>
                            </svg>
                        </div>
                        <div class="lesson-content">
                            <span class="lesson-number">Урок 3</span>
                            <span class="lesson-name">Сборка мусора (GC)</span>
                            <div class="lesson-meta">
                                <span>19 мин</span>
                                <span class="lesson-meta-dot"></span>
                                <span>Заблокирован</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTrack(track) {
            const pythonScreen = document.getElementById('python-screen');
            const csharpScreen = document.getElementById('csharp-screen');

            if (track === 'python') {
                pythonScreen.classList.add('active');
                csharpScreen.classList.remove('active');
            } else if (track === 'csharp') {
                csharpScreen.classList.add('active');
                pythonScreen.classList.remove('active');
            }
        }
    </script>
</body>
</html>
