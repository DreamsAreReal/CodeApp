<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="color-scheme" content="light" />
    <title>Фундамент C#</title>
    <!-- Telegram WebApp bridge: present inside Telegram, absent in a plain browser (dev fallback). -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Fonts are SELF-HOSTED (@fontsource, bundled by Vite) — imported from src/styles/fonts.css.
         No Google Fonts CDN link/preconnect: the app carries its own woff2 so it works offline and
         measures text deterministically on every runner (Linux CI has no system Rubik). -->
  </head>
  <body>
    <!-- Skip-link: first focusable element, jumps keyboard/AT users straight to the app content.
         Visually hidden until focused (see .skip-link in styles). Its target is the #app main. -->
    <a class="skip-link" href="#app">К основному содержимому</a>
    <!-- #app is the single mount point AND the document's one `main` landmark. Screen renderers
         only replace its innerHTML (never the element), so the landmark + id are stable across
         navigation — this is what document-level axe (landmark-one-main / region) checks. -->
    <div id="app" role="main" aria-label="Фундамент C#" tabindex="-1"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
