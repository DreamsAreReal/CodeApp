name: build-test-deploy

# Push to main = test -> build image -> push to GHCR -> deploy to the VPS over SSH.
# Pull requests only run the test gate. After a one-time secret setup, deploys are hands-off.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- gate: unit tests + type-check + bundle (fast, deterministic) ----
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Backend unit tests (xUnit)
        run: dotnet test backend/Codex.Backend.Tests/Codex.Backend.Tests.csproj -c Release
      - name: Frontend type-check + build
        working-directory: app
        run: |
          npm ci
          npm run build

  # ---- build the single-origin image and push to GHCR (main only) ----
  build-and-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image tags/labels (lowercased automatically)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          # most VPS are x86-64; for an ARM VPS change to linux/arm64 (verified to publish).
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- deploy: pull the fresh image on the VPS and restart (main only) ----
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH (self-provisioning compose)
        uses: appleboy/ssh-action@v1
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          IMAGE: ghcr.io/${{ github.repository }}:latest
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: GHCR_USER,GHCR_TOKEN,BOT_TOKEN,IMAGE
          script: |
            set -euo pipefail
            # GHCR image paths must be lowercase
            export CODEX_IMAGE="$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')"
            export TELEGRAM_BOT_TOKEN="$BOT_TOKEN"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            mkdir -p "$HOME/codex" && cd "$HOME/codex"
            # write the prod compose on the box (self-contained; nothing to pre-place)
            cat > docker-compose.prod.yml <<'YAML'
            services:
              codex:
                image: ${CODEX_IMAGE}
                restart: unless-stopped
                environment:
                  Telegram__BotToken: ${TELEGRAM_BOT_TOKEN:?bot token missing}
                volumes:
                  - codexdata:/data
                ports:
                  - "127.0.0.1:8080:8080"
            volumes:
              codexdata:
            YAML
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker logout ghcr.io || true
            docker image prune -f
