name: build-test-deploy

# Push to main = test -> build image -> push to GHCR -> deploy to the VPS over SSH.
# Pull requests only run the test gate. After a one-time secret setup, deploys are hands-off.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- gate: unit tests + coverage + type-check + bundle + headless acceptance ----
  test:
    runs-on: ubuntu-latest
    # Every headless harness (viz-fit / run / loop / shell / new-lessons / polish-flow) writes PNG
    # evidence. Their default evidence dir is a repo-relative docs/evidence, but on the Linux runner
    # we redirect it under the workspace so nothing depends on a developer's absolute path. One
    # job-level env covers all evidence-writing steps below (no hardcoded /Users/... anywhere).
    # NOTE: the `runner` context is NOT available in job-level env (only in steps), so use
    # `github.workspace` here — using runner.* here makes the whole workflow fail to start.
    env:
      EVIDENCE_DIR: ${{ github.workspace }}/.evidence
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: app/package-lock.json

      # Backend xUnit + code coverage (coverlet.collector).
      - name: Backend unit tests + coverage (xUnit + coverlet)
        run: >
          dotnet test backend/Codex.Backend.Tests/Codex.Backend.Tests.csproj
          -c Release
          --collect:"XPlat Code Coverage"
          --results-directory ${{ github.workspace }}/coverage
      # ENFORCED coverage gate: fail the job if line coverage drops below MIN_LINE. Current is
      # ~93%; the floor is 90% (~3pp headroom for honest churn without silently rotting the suite).
      # Parses the cobertura root line-rate (no XML dep) and compares in awk (no float in bash).
      - name: Enforce line-coverage threshold (>= 90%)
        env:
          MIN_LINE: "90"
        run: |
          f=$(find "${{ github.workspace }}/coverage" -name coverage.cobertura.xml | head -1)
          if [ -z "$f" ]; then echo "no cobertura report found — cannot enforce coverage"; exit 1; fi
          line=$(grep -o 'line-rate="[0-9.]*"' "$f" | head -1 | grep -o '[0-9.]*')
          branch=$(grep -o 'branch-rate="[0-9.]*"' "$f" | head -1 | grep -o '[0-9.]*')
          awk -v l="$line" -v b="$branch" -v min="$MIN_LINE" 'BEGIN{
            printf "line coverage:   %.2f%%\n", l*100;
            printf "branch coverage: %.2f%%\n", b*100;
            if (l*100 + 1e-9 < min) {
              printf "FAIL: line coverage %.2f%% is below the %d%% threshold\n", l*100, min;
              exit 1 }
            printf "PASS: line coverage meets the %d%% threshold\n", min }'
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: backend-coverage
          path: coverage/**/coverage.cobertura.xml
          if-no-files-found: warn

      - name: Frontend deps
        working-directory: app
        run: npm ci
      - name: Frontend type-check + build
        working-directory: app
        run: npm run build

      # ---- headless frontend acceptance (viz-fit) against a live backend+preview ----
      # viz-fit.mjs asserts label FIT / CLIP / OVERLAP for all 6 lessons in a real
      # Chromium. It needs the .NET backend on :5080 (Development => DevMode auth
      # bypass) and `vite preview` on :4173, so we spin both up before running it.
      - name: Install Playwright Chromium
        working-directory: app
        run: npx playwright install --with-deps chromium
      - name: Start backend (:5080) + preview (:4173) for acceptance
        working-directory: app
        run: |
          # Backend in Development so viz-fit's dev-auth works; throwaway SQLite file.
          ASPNETCORE_ENVIRONMENT=Development \
          ASPNETCORE_URLS=http://localhost:5080 \
          Database__Path=${{ runner.temp }}/codex-ci.db \
          dotnet run --no-launch-profile \
            --project ../backend/Codex.Backend/Codex.Backend.csproj -c Release \
            > "${{ runner.temp }}/backend.log" 2>&1 &
          npm run preview > "${{ runner.temp }}/preview.log" 2>&1 &
          # Wait until BOTH endpoints answer (or fail the job after ~60s).
          for i in $(seq 1 40); do
            b=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:5080/health/live || true)
            p=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:4173/ || true)
            [ "$b" = "200" ] && [ "$p" = "200" ] && { echo "backend+preview up"; exit 0; }
            sleep 2
          done
          echo "backend/preview did not come up"; tail -n 40 "${{ runner.temp }}"/*.log; exit 1
      - name: Frontend acceptance (viz-fit)
        working-directory: app
        run: |
          # Run the harness UNCHANGED; on failure surface every ✗/FAIL/violation line as a
          # GitHub ::error:: annotation so the exact geometry failures are visible without log-admin.
          node verify/viz-fit.mjs 2>&1 | tee /tmp/viz-fit.log
          c=${PIPESTATUS[0]}
          [ "$c" -ne 0 ] && grep -aE '✗|FAIL|violation' /tmp/viz-fit.log | sed 's/^/::error::/'
          exit $c
      # Full live-loop acceptance against the SAME live backend+preview already up above.
      # run.mjs proves the walking skeleton (home -> lesson -> grade -> schedule moves);
      # loop.mjs proves the daily-return loop + product-readiness states (first-run, session,
      # done, empty, error+retry, skeletons) with real data + a per-screen axe pass. shell.mjs
      # proves the Progress/Profile shell PLUS document-level a11y (html-lang/title/landmark).
      # Each harness mints RANDOM user ids, so they are self-isolating on the shared DB.
      - name: Frontend live-loop acceptance (run + loop + shell)
        working-directory: app
        run: |
          # Each harness runs UNCHANGED; on the first failure its ✗/FAIL/violation lines are
          # emitted as ::error:: annotations, then the job fails with that harness's exit code.
          for h in run loop shell; do
            node "verify/$h.mjs" 2>&1 | tee "/tmp/$h.log"
            c=${PIPESTATUS[0]}
            if [ "$c" -ne 0 ]; then
              grep -aE '✗|FAIL|violation' "/tmp/$h.log" | sed "s/^/::error::[$h] /"
              exit $c
            fi
          done
      # Multi-lesson authoring/generation acceptance: new-lessons.mjs walks all wave-1 lessons
      # (segments render + animation reaches its final frame, a graded card moves the schedule,
      # zero console errors, reduced-motion static frames). It reuses the SAME live backend:5080
      # + preview:4173 and mints RANDOM user ids, so it is self-isolating on the shared DB.
      # (EVIDENCE_DIR comes from the job-level env above — writable runner temp, no hardcoded path.)
      - name: Frontend multi-lesson acceptance (new-lessons)
        working-directory: app
        run: |
          # Harness UNCHANGED; on failure surface ✗/FAIL/violation lines as ::error:: annotations.
          node verify/new-lessons.mjs 2>&1 | tee /tmp/new-lessons.log
          c=${PIPESTATUS[0]}
          [ "$c" -ne 0 ] && grep -aE '✗|FAIL|violation' /tmp/new-lessons.log | sed 's/^/::error::/'
          exit $c

  # ---- build + deploy via deploy-hub (reusable workflow; main only) ----
  # The hub builds deploy/Dockerfile, pushes ghcr.io/<owner>/codeapp:sha-<commit>
  # and triggers the deploy runner on the VPS (health gate + auto-rollback +
  # journal). The previous inline build-and-push/deploy jobs are archived in
  # deploy.yml.legacy for reference.
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    # Required by deploy-hub's contract (hub workflow header): the reusable
    # workflow inherits the caller job's token permissions for the GHCR push.
    permissions: {contents: read, packages: write}
    uses: DreamsAreReal/deploy-hub/.github/workflows/deploy.yml@main
    with: {app: codeapp, dockerfile: deploy/Dockerfile}
    secrets: inherit
